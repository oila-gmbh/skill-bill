<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Skill Bill</title>
  <desc id="desc">Governed AI-agent skill platform for building, routing, validating, installing, and measuring reusable workflows across agents.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#070709"/>
      <stop offset="0.58" stop-color="#111116"/>
      <stop offset="1" stop-color="#070708"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f4c430"/>
      <stop offset="1" stop-color="#8f6d05"/>
    </linearGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#ffffff" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="360" fill="url(#bg)"/>
  <rect width="1200" height="360" fill="url(#grid)"/>

  <path d="M820 0H1200V360H660Z" fill="url(#gold)" opacity="0.9"/>
  <path d="M936 0H1200V360H780Z" fill="#050506" opacity="0.86"/>
  <path d="M695 42L910 360H520L392 128Z" fill="#000000" opacity="0.28"/>

  <g transform="translate(88 66)">
    <g>
      <circle cx="8" cy="8" r="8" fill="#60d394"/>
      <text x="28" y="13" fill="#f4c430" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="0">
        GOVERNED AI-AGENT SKILL PLATFORM
      </text>
    </g>

    <text x="0" y="106" fill="#f6f3e7" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="86" font-weight="800" letter-spacing="0">
      Skill Bill
    </text>

    <text x="2" y="158" fill="#f7efd3" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26" font-weight="550" letter-spacing="0">
      Build, route, validate, install, and measure reusable
    </text>
    <text x="2" y="193" fill="#f7efd3" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26" font-weight="550" letter-spacing="0">
      agent workflows across tools, teams, and platforms.
    </text>

    <g transform="translate(0 238)" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" text-anchor="middle" dominant-baseline="middle">
      <rect x="0" y="0" width="82" height="34" rx="17" fill="#0c0c0f" stroke="#f4c430" stroke-opacity="0.5"/>
      <text x="41" y="18" fill="#f5e8ae">Author</text>

      <rect x="96" y="0" width="76" height="34" rx="17" fill="#0c0c0f" stroke="#f4c430" stroke-opacity="0.5"/>
      <text x="134" y="18" fill="#f5e8ae">Route</text>

      <rect x="186" y="0" width="90" height="34" rx="17" fill="#0c0c0f" stroke="#f4c430" stroke-opacity="0.5"/>
      <text x="231" y="18" fill="#f5e8ae">Validate</text>

      <rect x="290" y="0" width="78" height="34" rx="17" fill="#0c0c0f" stroke="#f4c430" stroke-opacity="0.5"/>
      <text x="329" y="18" fill="#f5e8ae">Install</text>

      <rect x="382" y="0" width="88" height="34" rx="17" fill="#0c0c0f" stroke="#f4c430" stroke-opacity="0.5"/>
      <text x="426" y="18" fill="#f5e8ae">Measure</text>
    </g>
  </g>
</svg>
