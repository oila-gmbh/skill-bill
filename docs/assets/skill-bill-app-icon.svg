<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Skill Bill</title>
  <desc id="desc">Skill Bill application icon: gold SB monogram on a rounded gold badge.</desc>
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4c430"/>
      <stop offset="1" stop-color="#8f6d05"/>
    </linearGradient>
    <linearGradient id="goldHighlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff2b8" stop-opacity="0.55"/>
      <stop offset="0.45" stop-color="#fff2b8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c0c0f"/>
      <stop offset="1" stop-color="#070709"/>
    </linearGradient>
  </defs>

  <rect x="32" y="32" width="960" height="960" rx="220" ry="220" fill="url(#gold)"/>
  <rect x="32" y="32" width="960" height="960" rx="220" ry="220" fill="url(#goldHighlight)"/>
  <rect x="32" y="32" width="960" height="960" rx="220" ry="220" fill="none" stroke="#070709" stroke-opacity="0.18" stroke-width="6"/>

  <!-- 'SB' wordmark is composited from DejaVuSansMono-Bold.ttf at build time so
       the generated PNG/ICO/ICNS lock in a coding-font shape regardless of the
       SVG renderer's font resolution. Text element retained for SVG viewers. -->
  <g fill="url(#ink)" font-family="'DejaVu Sans Mono', 'JetBrains Mono', 'Fira Code', Hack, 'Liberation Mono', monospace" font-weight="700" font-size="360" text-anchor="end" letter-spacing="-4">
    <text x="944" y="944">SB</text>
  </g>

  <circle cx="820" cy="220" r="44" fill="#60d394" stroke="#070709" stroke-opacity="0.35" stroke-width="6"/>
</svg>
