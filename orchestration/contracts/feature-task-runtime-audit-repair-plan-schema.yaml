$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://skill-bill.dev/contracts/feature-task-runtime-audit-repair-plan-schema.yaml"
title: "Feature-task-runtime audit repair plan"
description: "Complete, dependency-ordered remediation plan emitted by an audit with gaps."
type: object
additionalProperties: false
required: [contract_version, gaps]
properties:
  contract_version:
    type: string
    const: "0.1"
  gaps:
    type: array
    minItems: 1
    items:
      $ref: "#/$defs/gap"
$defs:
  nonBlank:
    type: string
    minLength: 1
    pattern: ".*\\S.*"
  repairItem:
    type: object
    additionalProperties: false
    required: [repair_item_id, intended_outcome, implementation_actions, affected_paths_or_symbols, required_verification, depends_on, status]
    properties:
      repair_item_id: { $ref: "#/$defs/nonBlank" }
      intended_outcome: { $ref: "#/$defs/nonBlank" }
      implementation_actions:
        type: array
        minItems: 1
        items: { $ref: "#/$defs/nonBlank" }
      affected_paths_or_symbols:
        type: array
        items: { $ref: "#/$defs/nonBlank" }
      required_verification:
        type: array
        minItems: 1
        items: { $ref: "#/$defs/nonBlank" }
      depends_on:
        type: array
        uniqueItems: true
        items: { $ref: "#/$defs/nonBlank" }
      status:
        const: pending
  gap:
    type: object
    additionalProperties: false
    required: [gap_id, acceptance_criterion_ref, acceptance_criterion_text, failure_evidence, diagnosis, affected_boundary, repair_items]
    properties:
      gap_id: { $ref: "#/$defs/nonBlank" }
      acceptance_criterion_ref: { $ref: "#/$defs/nonBlank" }
      acceptance_criterion_text: { $ref: "#/$defs/nonBlank" }
      failure_evidence: { $ref: "#/$defs/nonBlank" }
      diagnosis: { $ref: "#/$defs/nonBlank" }
      affected_boundary: { $ref: "#/$defs/nonBlank" }
      repair_items:
        type: array
        minItems: 1
        items: { $ref: "#/$defs/repairItem" }
