        type: integer
        minimum: 1
        maximum: 2147483647
      subtask_name:
        type: string
      status:
        $ref: "#/$defs/goalSubtaskStatusEnum"
      started_at:
        type: string
        minLength: 1
        description: ISO-8601 timestamp the subtask started at.
      finished_at:
        type: string
        minLength: 1
        description: ISO-8601 timestamp the subtask finished at.
      duration_seconds:
        type: integer
        minimum: 0
        maximum: 2147483647
      attempt_count:
        type: integer
        minimum: 0
        maximum: 2147483647
      blocked_reason:
        type:
          - string
          - "null"
        description: >
          Category-prefixed blocked reason when `status` is `blocked`; `null`
          otherwise. Required key with a nullable value. Prefixes are `limit:`,
          `validation:`, `fix_loop:`, `git:`, `store_lock:`, `needs_human:`,
          `schema:`, `runtime:`, and `unknown:`.
      finalizing_agent_id:
        type:
          - string
          - "null"
        description: >
          Resolved agent that finalized the subtask (the terminal COMPLETE/BLOCKED ledger
          entry); `null` when no agent attribution was rolled up. Additive-optional: legacy
          payloads omit the key.
      participating_agent_ids:
        type: array
        items:
          type: string
        description: >
          Order-stable distinct resolved agents that executed a phase of the subtask. Enables
          per-agent finalized vs handoff-participant aggregation. Additive-optional: legacy
          payloads omit the key.
      boundary_history_value:
        $ref: "#/$defs/historySignalEnum"
        description: >
          History-usefulness rating the subtask's feature-task run produced for the
          boundary history.md it read on entry. Additive-optional: legacy payloads omit the key.
      boundary_history_written:
        type: boolean
        description: >
          Whether the subtask's feature-task run wrote a boundary history.md entry.
          Additive-optional: legacy payloads omit the key.

