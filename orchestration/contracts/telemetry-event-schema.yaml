# ---------------------------------------------------------------------------
# Coherence checks (enforced in Kotlin)
# ---------------------------------------------------------------------------
# These rules either cannot be expressed cleanly in JSON Schema or are
# enforced by the runtime before the payload reaches the parse seam.
# They are documented here so this file alone describes the full
# contract.
x-coherence-checks:
  discriminator-strategy:
    description: >
      Top-level `oneOf` keyed by `event_name`; each branch lives under
      `$defs/<eventCamelCaseName>Event` and pins `event_name` and
      `contract_version` as consts. `discriminator.propertyName=event_name`
      gives validators a fast path to the correct branch and gives
      readers a clear hint about how the union is keyed. `oneOf` (not
      `anyOf`) because the branches are mutually exclusive.
  contract-version-parity:
    description: >
      `TELEMETRY_EVENT_CONTRACT_VERSION` in Kotlin must equal
      `properties.contract_version.const` AND every branch's
      `contract_version.const`. Pinned by
      `TelemetryEventSchemaContractVersionTest`; the parity test fails
      the build if they diverge.
  toolnames-membership:
    description: >
      Every `$defs.<branch>.properties.event_name.const` MUST appear in
      `McpToolRegistry.toolNames` AND vice versa, EXCEPT for the
      runtime-internal emission events enumerated in
      `goal-telemetry-emission-events` below. Pinned by
      `TelemetryEventInputSchemaParityTest`, which walks the toolNames
      list and verifies both directions, so adding a new event name in
      Kotlin without authoring the YAML branch (or vice versa) fails
      the build. The same test holds an explicit allow-list of the
      runtime-internal emission events so their branches are exempt from
      the "every branch maps to a tool" direction only.
  goal-telemetry-emission-events:
    description: >
      `goal_started`, `goal_subtask_finished`, `goal_finished`,
      `goal_issue_finished`, and `skillbill_review_finished` are
      RUNTIME-INTERNAL emission payload contracts emitted by runtime
      lifecycles. They are intentionally ABSENT from
      `McpToolRegistry.toolNames` — they are not MCP tools and have no
      dispatcher handler or input schema. Only `goal_stats` is a
      registered tool in the decomposed-goal family.
      `TelemetryEventInputSchemaParityTest` carries an explicit
      allow-list (`runtimeInternalEmissionEvents`) matching these names
      so the "every schema branch maps to a tool" assertion skips them;
      doc and enforcement stay in lockstep.
  review-finished-normalized-label-equality:
    description: >
      `skillbill_review_finished.review_platform`, `detected_stack`, and
      `platform_slug` must be equal normalized clean slugs. JSON Schema
      enforces the clean-slug shape without hard-coding manifest-driven
      platform-pack slugs; `TelemetryEventSchemaValidator` enforces the
      cross-field equality after schema validation.
  inputschemas-structural-parity:
    description: >
      For every event with an entry in `McpToolRegistry.inputSchemas`,
      the corresponding `$defs.<event>` branch MUST be structurally
      equivalent — same required keys, same property shapes, same
      `additionalProperties` flag. Events without an `inputSchemas`
      entry fall through to `McpToolSpec.openObjectSchema()` in Kotlin,
      and the YAML branch declares `additionalProperties: true` with
      no extra properties. Both directions enforced by
      `TelemetryEventInputSchemaParityTest`.
  argument-shape-failures-surface:
    description: >
      Argument-shape failures from BOTH parse seams — the strict-args
      gate in `McpStdioServer.callToolResult` (unknown / additional
      property at the JSON-RPC `arguments` map) AND the schema
      validator in `McpToolDispatcher.call` (missing required, enum
      mismatch, type mismatch, oneOf/discriminator mismatch) — surface
      uniformly as MCP `isError=true` responses. Transport-level
      JSON-RPC errors (codes such as `-32700`, `-32601`) are reserved
      for protocol violations only (unparseable line, unknown method).
      Clients therefore handle a single transport shape for every
      "request is structurally invalid for the named tool" fault.
      Pinned by `McpStdioArgumentShapeUnifiedContractTest`.
