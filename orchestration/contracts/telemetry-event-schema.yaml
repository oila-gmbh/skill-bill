# Telemetry event wire schema (canonical source of truth).
#
# This file describes the shape of every telemetry envelope the Skill
# Bill runtime emits at its MCP tool seams (the `*_started/*_finished`,
# `*_workflow_*`, and other invocation tools exposed by
# `McpToolRegistry.toolNames`). It is authored in YAML for human
# readability and consumed as a JSON Schema (Draft 2020-12) by the
# Kotlin runtime (`TelemetryEventSchemaValidator` in `runtime-mcp`).
#
# What lives here vs. in Kotlin:
#
# - This file defines, for every event, its `event_name` (a const),
#   the pinned `contract_version`, and the typed payload fields the
#   event carries on the wire. The payload shape mirrors
#   `McpToolRegistry.inputSchemas[<event>]` structurally —
#   `TelemetryEventInputSchemaParityTest` walks every name in
#   `McpToolRegistry.toolNames` and fails the build if the two ever
#   diverge.
# - Cross-field "coherence" rules that JSON Schema cannot express
#   cleanly stay in Kotlin (`McpToolDispatcher` and surrounding parse
#   seams). Every such rule is named below under
#   `x-coherence-checks` so the schema document alone fully describes
#   the contract.
#
# Discriminator strategy:
#
# - Top-level `oneOf` keyed by `event_name`. Each branch lives under
#   `$defs/<eventCamelCaseName>Event` and pins `event_name` as a const,
#   so a single envelope payload always selects exactly one branch.
# - `discriminator.propertyName: event_name` gives validators a fast
#   path to the matching branch and gives readers a clear hint about
#   how the union is keyed. `oneOf` (not `anyOf`) because the branches
#   are mutually exclusive — `event_name` is a const in each branch.
#
# Versioning rule:
#
# - `contract_version` is pinned by `TELEMETRY_EVENT_CONTRACT_VERSION`
#   in `runtime-kotlin/runtime-mcp/src/main/kotlin/skillbill/mcp/TelemetryEventSchemaPaths.kt`.
# - The parity test `TelemetryEventSchemaContractVersionTest` fails the
#   build if they diverge. To bump the contract, edit BOTH constants in
#   the same change.
$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://skill-bill.dev/contracts/telemetry-event-schema.yaml"
title: "Telemetry event wire payload"
description: >
  Schema for every telemetry event the Skill Bill runtime emits at its
  MCP tool seams. Describes SHAPE only and never hard-codes
  caller-specific identifiers (concrete session ids, repo paths, etc.).
  New telemetry events ship as long as the wire envelope matches this
  schema and the coherence checks below.
type: object
# Top-level shape is the discriminated union — every payload field lives
# on the per-event branch under `$defs/<event>Event` (see `oneOf`
# below). The branch sets `additionalProperties` (`false` for strict
# events, `true` for open events), so declaring `additionalProperties`
# here would double-reject every payload field after the branch already
# validated it. We pin the envelope keys (`event_name`,
# `contract_version`) on the branch itself instead — every branch
# re-states both as consts so each branch is self-contained when read
# in isolation.
required:
  - event_name
  - contract_version
properties:
  event_name:
    type: string
    minLength: 1
    description: >
      Discriminator for the per-event branch under `oneOf`. Pinned per
      branch as a const; every value MUST appear in
      `McpToolRegistry.toolNames`.
  contract_version:
    type: string
    const: "1.4.0"
    description: >
      Pinned to `TELEMETRY_EVENT_CONTRACT_VERSION` (currently "1.4.0").
      The parity test `TelemetryEventSchemaContractVersionTest` keeps
      the two in lockstep.

discriminator:
  propertyName: event_name

# Per-event branch table. Each branch under `$defs/<event>Event`:
# - pins `event_name` as a const (matching the `McpToolRegistry.toolNames` value).
# - re-states `contract_version` as a const so the branch is
#   self-contained when a tool reads a single branch in isolation.
# - declares the payload fields that mirror
#   `McpToolRegistry.inputSchemas[<event>]`. Events without an explicit
#   `inputSchemas` entry fall through to `McpToolSpec.openObjectSchema()`
#   in Kotlin (`{type: object, additionalProperties: true}`); the
#   corresponding branch here is an open-object envelope with
#   `additionalProperties: true` and no extra `properties`. The parity
#   test asserts that open-object shape so future code that adds a
#   strict `inputSchemas` entry without authoring the YAML branch fails
#   loudly.
oneOf:
  - $ref: "#/$defs/doctorEvent"
  - $ref: "#/$defs/featureTaskProseFinishedEvent"
  - $ref: "#/$defs/featureTaskProseStatsEvent"
  - $ref: "#/$defs/featureTaskProseStartedEvent"
  - $ref: "#/$defs/featureTaskProseWorkflowGetEvent"
  - $ref: "#/$defs/featureTaskProseWorkflowLatestEvent"
  - $ref: "#/$defs/featureTaskProseWorkflowListEvent"
  - $ref: "#/$defs/featureTaskProseWorkflowContinueEvent"
  - $ref: "#/$defs/featureTaskProseWorkflowOpenEvent"
  - $ref: "#/$defs/featureTaskProseWorkflowResumeEvent"
  - $ref: "#/$defs/featureTaskProseWorkflowUpdateEvent"
  - $ref: "#/$defs/featureVerifyFinishedEvent"
  - $ref: "#/$defs/featureVerifyStatsEvent"
  - $ref: "#/$defs/featureVerifyStartedEvent"
  - $ref: "#/$defs/featureVerifyWorkflowGetEvent"
  - $ref: "#/$defs/featureVerifyWorkflowLatestEvent"
  - $ref: "#/$defs/featureVerifyWorkflowListEvent"
  - $ref: "#/$defs/featureVerifyWorkflowContinueEvent"
  - $ref: "#/$defs/featureVerifyWorkflowOpenEvent"
  - $ref: "#/$defs/featureVerifyWorkflowResumeEvent"
  - $ref: "#/$defs/featureVerifyWorkflowUpdateEvent"
  - $ref: "#/$defs/featureTaskRuntimeWorkflowGetEvent"
  - $ref: "#/$defs/featureTaskRuntimeWorkflowLatestEvent"
  - $ref: "#/$defs/featureTaskRuntimeWorkflowListEvent"
  - $ref: "#/$defs/featureTaskRuntimeWorkflowContinueEvent"
  - $ref: "#/$defs/featureTaskRuntimeWorkflowOpenEvent"
  - $ref: "#/$defs/featureTaskRuntimeWorkflowResumeEvent"
  - $ref: "#/$defs/featureTaskRuntimeWorkflowUpdateEvent"
  - $ref: "#/$defs/featureTaskRuntimeStartedEvent"
  - $ref: "#/$defs/featureTaskRuntimeFinishedEvent"
  - $ref: "#/$defs/featureTaskRuntimeStatsEvent"
  - $ref: "#/$defs/goalProseFinishedEvent"
  - $ref: "#/$defs/goalProseStartedEvent"
  - $ref: "#/$defs/goalProseSubtaskFinishedEvent"
  - $ref: "#/$defs/goalStartedEvent"
  - $ref: "#/$defs/goalSubtaskFinishedEvent"
  - $ref: "#/$defs/goalFinishedEvent"
  - $ref: "#/$defs/goalIssueFinishedEvent"
  - $ref: "#/$defs/goalStatsEvent"
  - $ref: "#/$defs/importReviewEvent"
  - $ref: "#/$defs/newSkillScaffoldEvent"
  - $ref: "#/$defs/prDescriptionGeneratedEvent"
  - $ref: "#/$defs/qualityCheckFinishedEvent"
  - $ref: "#/$defs/qualityCheckStartedEvent"
  - $ref: "#/$defs/skillbillReviewFinishedEvent"
  - $ref: "#/$defs/readianAuthStatusEvent"
  - $ref: "#/$defs/readianGetArticleEvent"
  - $ref: "#/$defs/readianGetArticlesForTopicQueryEvent"
  - $ref: "#/$defs/readianGetSpotlightEvent"
  - $ref: "#/$defs/readianMarkStoryStatusEvent"
  - $ref: "#/$defs/readianSaveCandidateEvent"
  - $ref: "#/$defs/resolveLearningsEvent"
  - $ref: "#/$defs/reviewStatsEvent"
  - $ref: "#/$defs/telemetryProxyCapabilitiesEvent"
  - $ref: "#/$defs/telemetryRemoteStatsEvent"
  - $ref: "#/$defs/triageFindingsEvent"
  - $ref: "#/$defs/updateCheckEvent"

$defs:
  # ---------------------------------------------------------------------
  # Shared enum/shape table. Mirrors
  # `runtime-kotlin/runtime-mcp/src/main/kotlin/skillbill/mcp/McpInputSchemas.kt`.
  # ---------------------------------------------------------------------
  historySignalEnum:
    type: string
    enum:
      - "none"
      - irrelevant
      - low
      - medium
      - high
  qualityCheckScopeEnum:
    type: string
    enum:
      - files
      - working_tree
      - branch_diff
      - repo
  specInputTypeEnum:
    type: string
    enum:
      - raw_text
      - pdf
      - markdown_file
      - image
      - directory
  workflowImplementStatusEnum:
    type: string
    enum:
      - pending
      - running
      - completed
      - failed
      - abandoned
      - blocked
  workflowVerifyStatusEnum:
    type: string
    enum:
      - pending
      - running
      - completed
      - failed
      - abandoned
  workflowImplementStepIdEnum:
    type: string
    enum:
      - assess
      - create_branch
      - preplan
      - plan
      - implement
      - review
      - audit
      - validate
      - write_history
      - commit_push
      - pr_description
      - finish
  workflowVerifyStepIdEnum:
    type: string
    enum:
      - collect_inputs
      - extract_criteria
      - gather_diff
      - feature_flag_audit
      - code_review
      - unit_test_value_check
      - completeness_audit
      - verdict
      - finish
  workflowStepStatusEnum:
    type: string
    enum:
      - pending
      - running
      - completed
      - failed
      - blocked
      - skipped
  # SKILL-66 Subtask 1: terminal-status enums for the decomposed-goal
  # telemetry family. Deliberately NOT reusing `workflowStepStatusEnum`:
  # the goal subtask terminal set is `complete` (not `completed`),
  # `blocked`, `skipped`, and the goal-run terminal set is `completed`
  # (not `complete`) / `blocked`. Single-sourced here for Subtasks 2/3.
  goalSubtaskStatusEnum:
    type: string
    enum:
      - complete
      - blocked
      - skipped
  goalFinishedStatusEnum:
    type: string
    enum:
      - completed
      - blocked
      - abandoned
  goalRunnerStopReasonEnum:
    type: string
    enum:
      - FAILED
      - BLOCKED
      - POLICY_BLOCKED
      - INTERRUPTED
      - TIMEOUT
      - NO_TERMINAL_STORE_OUTCOME
      - PULL_REQUEST_FAILED
      - DEPENDENCIES_BLOCKED
  freeObjectShape:
    type: object
  reviewChildStep:
    type: object
    additionalProperties: true
    required:
      - skill
      - total_findings
      - accepted_findings
      - rejected_findings
      - unresolved_findings
      - accepted_rate
      - rejected_rate
    properties:
      skill:
        type: string
      total_findings:
        type: integer
      accepted_findings:
        type: integer
      rejected_findings:
        type: integer
      unresolved_findings:
        type: integer
      accepted_rate:
        type: number
      rejected_rate:
        type: number
      accepted_finding_details:
        type: array
        items:
          $ref: "#/$defs/reviewChildFindingDetail"
      rejected_finding_details:
        type: array
        items:
          $ref: "#/$defs/reviewChildFindingDetail"
  reviewChildFindingDetail:
    type: object
    additionalProperties: true
    required:
      - issue_category
      - severity
      - confidence
      - outcome_type
    properties:
      issue_category:
        type: string
      severity:
        type: string
        enum:
          - Blocker
          - Major
          - Minor
      confidence:
        type: string
        enum:
          - High
          - Medium
          - Low
          - high
          - medium
          - low
      outcome_type:
        type: string
        enum:
          - finding_accepted
          - fix_applied
          - finding_edited
          - fix_rejected
          - false_positive
  qualityCheckChildStep:
    type: object
    additionalProperties: true
    required:
      - skill
      - result
      - iterations
      - initial_failure_count
      - final_failure_count
    properties:
      skill:
        type: string
      result:
        type: string
        enum:
          - pass
          - fail
          - skipped
          - unsupported_stack
      iterations:
        type: integer
      initial_failure_count:
        type: integer
      final_failure_count:
        type: integer
      failing_check_names:
        type: array
        items:
          type: string
      failing_check_details:
        type: array
        items:
          $ref: "#/$defs/freeObjectShape"
  prDescriptionChildStep:
    type: object
    additionalProperties: true
    required:
      - skill
      - pr_created
      - commit_count
      - files_changed_count
    properties:
      skill:
        type: string
      pr_created:
        type: boolean
      commit_count:
        type: integer
      files_changed_count:
        type: integer
  emptyObjectShape:
    type: object
    additionalProperties: false
    properties: {}
    required: []
  stepUpdateImplementShape:
    type: object
    additionalProperties: false
    required:
      - step_id
      - status
      - attempt_count
    properties:
      step_id:
        $ref: "#/$defs/workflowImplementStepIdEnum"
      status:
        $ref: "#/$defs/workflowStepStatusEnum"
      attempt_count:
        type: integer
  stepUpdateVerifyShape:
    type: object
    additionalProperties: false
    required:
      - step_id
      - status
      - attempt_count
    properties:
      step_id:
        $ref: "#/$defs/workflowVerifyStepIdEnum"
      status:
        $ref: "#/$defs/workflowStepStatusEnum"
      attempt_count:
        type: integer
  # SKILL-65 Subtask 4 (AC3): the EXPERIMENTAL feature-task-runtime workflow
  # status + phase step-id enums. The phase step ids mirror
  # FeatureTaskRuntimePhaseWorkflowDefinition.definition.stepIds.
  workflowTaskRuntimeStatusEnum:
    type: string
    enum:
      - pending
      - running
      - completed
      - failed
      - abandoned
      - blocked
  # The phase step ids MUST mirror
  # FeatureTaskRuntimePhaseWorkflowDefinition.definition.stepIds (the same source
  # McpToolRegistry derives the MCP update step-id enum from). The parity test
  # `TelemetryTaskRuntimeStepIdEnumParityTest` (runtime-mcp) fails the build if
  # this enum and that definition diverge in value or order.
  workflowTaskRuntimeStepIdEnum:
    type: string
    enum:
      - preplan
      - plan
      - implement
      - implement_fix
      - review
      - audit
      - validate
      - write_history
      - commit_push
      - pr
  stepUpdateTaskRuntimeShape:
    type: object
    additionalProperties: false
    required:
      - step_id
      - status
      - attempt_count
    properties:
      step_id:
        $ref: "#/$defs/workflowTaskRuntimeStepIdEnum"
      status:
        $ref: "#/$defs/workflowStepStatusEnum"
      # Bounds mirror the workflow-state schema's shared `step.attempt_count`.
      attempt_count:
        type: integer
        minimum: 0
        maximum: 2147483647

  # ---------------------------------------------------------------------
  # Per-event branches.
  #
  # Convention: each branch fixes `event_name` as a const and
  # `contract_version` as a const. Branches whose payload mirrors a
  # strict `inputSchemas` entry declare `additionalProperties: false`;
  # branches that mirror the runtime's `openObjectSchema()` fallback
  # declare `additionalProperties: true` with no extra `properties`.
  # `TelemetryEventInputSchemaParityTest` enforces both halves.
  # ---------------------------------------------------------------------

  # --- Open-object branches (no `inputSchemas` entry on the Kotlin side) ---

  doctorEvent:
    type: object
    additionalProperties: true
    required:
      - event_name
      - contract_version
    properties:
      event_name:
        const: doctor
      contract_version:
        const: "1.4.0"

  updateCheckEvent:
    type: object
    additionalProperties: true
    required:
      - event_name
      - contract_version
    properties:
      event_name:
        const: update_check
      contract_version:
        const: "1.4.0"

  featureTaskProseStatsEvent:
    type: object
    additionalProperties: true
    required:
      - event_name
      - contract_version
    properties:
      event_name:
        const: feature_task_prose_stats
      contract_version:
        const: "1.4.0"

  featureVerifyStatsEvent:
    type: object
    additionalProperties: true
    required:
      - event_name
      - contract_version
    properties:
      event_name:
        const: feature_verify_stats
      contract_version:
        const: "1.4.0"

  featureTaskRuntimeStatsEvent:
    type: object
    additionalProperties: true
    required:
      - event_name
      - contract_version
    properties:
      event_name:
        const: feature_task_runtime_stats
      contract_version:
        const: "1.4.0"

  readianAuthStatusEvent:
    type: object
    additionalProperties: true
    required:
      - event_name
      - contract_version
    properties:
      event_name:
        const: readian_auth_status
      contract_version:
        const: "1.4.0"

  reviewStatsEvent:
    type: object
    additionalProperties: true
    required:
      - event_name
      - contract_version
    properties:
      event_name:
        const: review_stats
      contract_version:
        const: "1.4.0"

  telemetryProxyCapabilitiesEvent:
    type: object
    additionalProperties: true
    required:
      - event_name
      - contract_version
    properties:
      event_name:
        const: telemetry_proxy_capabilities
      contract_version:
        const: "1.4.0"

  telemetryRemoteStatsEvent:
    type: object
    additionalProperties: false
    required:
      - event_name
      - contract_version
      - workflow
    properties:
      event_name:
        const: telemetry_remote_stats
      contract_version:
        const: "1.4.0"
      workflow:
        type: string
        enum:
          - verify
          - implement
          - bill-feature-task
          - bill-feature-verify
          - feature-task-prose
          - feature-task-runtime
          - goal
          - bill-feature-goal
      since:
        type: string
      date_from:
        type: string
      date_to:
        type: string
      group_by:
        type: string
        enum:
          - ""
          - day
          - week

  # --- Strict branches (mirror `inputSchemas` entries verbatim) ---

  featureTaskProseStartedEvent:
    type: object
    additionalProperties: false
    required:
      - event_name
      - contract_version
      - feature_size
      - acceptance_criteria_count
      - open_questions_count
      - spec_input_types
      - spec_word_count
      - rollout_needed
      - feature_name
      - issue_key
      - spec_summary
    properties:
      event_name:
        const: feature_task_prose_started
      contract_version:
        const: "1.4.0"
      feature_size:
        type: string
        enum:
          - SMALL
          - MEDIUM
          - LARGE
      source:
        type: string
        enum:
          - production
          - test
          - synthetic
          - unknown
      acceptance_criteria_count:
        type: integer
      open_questions_count:
        type: integer
      spec_input_types:
        type: array
        items:
          $ref: "#/$defs/specInputTypeEnum"
      spec_word_count:
        type: integer
      rollout_needed:
        type: boolean
      feature_name:
        type: string
      issue_key:
        type: string
      issue_key_type:
        type: string
        enum:
          - jira
          - linear
          - github
          - other
          - "none"
      spec_summary:
        type: string

  featureTaskProseFinishedEvent:
    type: object
    additionalProperties: false
    required:
      - event_name
      - contract_version
      - session_id
      - completion_status
      - plan_correction_count
      - plan_task_count
      - plan_phase_count
      - feature_flag_used
      - files_created
      - files_modified
      - tasks_completed
      - review_iterations
      - audit_result
      - audit_iterations
      - validation_result
      - boundary_history_written
      - pr_created
      - plan_deviation_notes
    properties:
      event_name:
        const: feature_task_prose_finished
      contract_version:
        const: "1.4.0"
      session_id:
        type: string
      source:
        type: string
        enum:
          - production
          - test
          - synthetic
          - unknown
      completion_status:
        type: string
        enum:
          - completed
          - abandoned_at_planning
          - abandoned_at_implementation
          - abandoned_at_review
          - error
          - stale
      plan_correction_count:
        type: integer
      plan_task_count:
        type: integer
      plan_phase_count:
        type: integer
      feature_flag_used:
        type: boolean
      files_created:
        type: integer
      files_modified:
        type: integer
      tasks_completed:
        type: integer
      review_iterations:
        type: integer
      audit_result:
        type: string
        enum:
          - all_pass
          - had_gaps
          - skipped
      audit_iterations:
        type: integer
      validation_result:
        type: string
        enum:
          - pass
          - fail
          - skipped
      boundary_history_written:
        type: boolean
      pr_created:
        type: boolean
      feature_flag_pattern:
        type: string
        enum:
          - simple_conditional
          - di_switch
          - legacy
          - "none"
      boundary_history_value:
        type: string
        enum:
          - "none"
          - irrelevant
          - low
          - medium
          - high
      plan_deviation_notes:
        type: string
      duration_seconds:
        type: integer
      child_steps:
        type: array
        items:
          oneOf:
            - $ref: "#/$defs/reviewChildStep"
            - $ref: "#/$defs/qualityCheckChildStep"
            - $ref: "#/$defs/prDescriptionChildStep"
      estimated_phase_tokens:
        type: object
        description: >-
          Estimated token breakdown by phase (heuristic, not billing-accurate).
          Each key is a phase id; each value is an object with estimated_input_tokens
          and estimated_output_tokens.
        additionalProperties: true
      estimated_total_tokens:
        type: integer
        description: >-
          Estimated total tokens across all phases (heuristic, not billing-accurate).
          Sum of estimated_input_tokens and estimated_output_tokens for all phases that ran.

  featureTaskProseWorkflowContinueEvent:
    type: object
    additionalProperties: false
    required:
      - event_name
      - contract_version
    properties:
      event_name:
        const: feature_task_prose_workflow_continue
      contract_version:
        const: "1.4.0"
      workflow_id:
        type: string
      issue_key:
        type: string
      subtask_id:
        type: integer

  featureTaskProseWorkflowGetEvent:
    type: object
    additionalProperties: false
    required:
      - event_name
      - contract_version
      - workflow_id
    properties:
      event_name:
        const: feature_task_prose_workflow_get
      contract_version:
        const: "1.4.0"
      workflow_id:
        type: string

  featureTaskProseWorkflowLatestEvent:
    type: object
    additionalProperties: false
    required:
      - event_name
      - contract_version
    properties:
      event_name:
        const: feature_task_prose_workflow_latest
      contract_version:
        const: "1.4.0"

  featureTaskProseWorkflowListEvent:
    type: object
    additionalProperties: false
    required:
      - event_name
      - contract_version
    properties:
      event_name:
        const: feature_task_prose_workflow_list
      contract_version:
        const: "1.4.0"
      limit:
        type: integer

  featureTaskProseWorkflowOpenEvent:
    type: object
    additionalProperties: false
    required:
      - event_name
      - contract_version
    properties:
      event_name:
        const: feature_task_prose_workflow_open
      contract_version:
        const: "1.4.0"
      session_id:
        type: string
      current_step_id:
        type: string

  featureTaskProseWorkflowResumeEvent:
    type: object
    additionalProperties: false
    required:
      - event_name
      - contract_version
      - workflow_id
    properties:
      event_name:
        const: feature_task_prose_workflow_resume
      contract_version:
        const: "1.4.0"
      workflow_id:
        type: string

  featureTaskProseWorkflowUpdateEvent:
    type: object
    additionalProperties: false
    required:
      - event_name
      - contract_version
      - workflow_id
      - workflow_status
      - current_step_id
    properties:
      event_name:
        const: feature_task_prose_workflow_update
      contract_version:
        const: "1.4.0"
      workflow_id:
        type: string
      workflow_status:
        $ref: "#/$defs/workflowImplementStatusEnum"
      current_step_id:
        $ref: "#/$defs/workflowImplementStepIdEnum"
      step_updates:
        type: array
        items:
          $ref: "#/$defs/stepUpdateImplementShape"
      artifacts_patch:
        $ref: "#/$defs/freeObjectShape"
      session_id:
        type: string

  featureVerifyStartedEvent:
    type: object
    additionalProperties: false
    required:
      - event_name
      - contract_version
      - acceptance_criteria_count
      - rollout_relevant
      - spec_summary
    properties:
      event_name:
        const: feature_verify_started
      contract_version:
        const: "1.4.0"
