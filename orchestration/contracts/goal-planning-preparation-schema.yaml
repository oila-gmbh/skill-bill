$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://skill-bill.dev/contracts/goal-planning-preparation-schema.yaml"
title: "Goal planning preparation"
description: Durable goal-owned shared-preplan or independently checkpointed subtask-plan envelope.
properties:
  contract_version:
    type: string
    const: "0.2"
oneOf:
  - $ref: "#/$defs/sharedPreplan"
  - $ref: "#/$defs/subtaskPlan"
$defs:
  identity:
    type: object
    additionalProperties: false
    required: [parent_goal_workflow_id, normalized_issue_key, repository_identity]
    properties:
      parent_goal_workflow_id: { type: string, minLength: 1 }
      normalized_issue_key: { type: string, pattern: "^[A-Z][A-Z0-9]*-[1-9][0-9]*$" }
      repository_identity: { type: string, minLength: 1 }
  provenance:
    type: object
    additionalProperties: false
    required:
      - parent_spec_hash
      - decomposition_manifest_hash
      - planning_contract_id
      - planning_contract_version
      - phase_output_contract_id
      - phase_output_contract_version
    properties:
      parent_spec_hash: { type: string, pattern: "^[a-f0-9]{64}$" }
      decomposition_manifest_hash: { type: string, pattern: "^[a-f0-9]{64}$" }
      planning_contract_id: { type: string, const: "https://skill-bill.dev/contracts/goal-planning-preparation-schema.yaml" }
      planning_contract_version: { type: string, const: "0.2" }
      phase_output_contract_id: { type: string, const: "https://skill-bill.dev/contracts/feature-task-runtime-phase-output-schema.yaml" }
      phase_output_contract_version: { type: string, const: "0.2" }
  sharedPreplan:
    type: object
    additionalProperties: false
    required: [contract_version, record_type, identity, preparation_status, provenance, payload_sha256, preplan_payload]
    properties:
      contract_version: { type: string, const: "0.2" }
      record_type: { const: shared_preplan }
      identity: { $ref: "#/$defs/identity" }
      preparation_status: { const: prepared }
      provenance: { $ref: "#/$defs/provenance" }
      payload_sha256: { type: string, pattern: "^[a-f0-9]{64}$" }
      preplan_payload: { type: string, minLength: 1 }
  subtaskPlan:
    type: object
    additionalProperties: false
    required: [contract_version, record_type, identity, subtask_id, manifest_order, governed_sub_spec_path, sub_spec_hash, preparation_status, provenance, payload_sha256, plan_payload]
    properties:
      contract_version: { type: string, const: "0.2" }
      record_type: { const: subtask_plan }
      identity: { $ref: "#/$defs/identity" }
      subtask_id: { type: integer, minimum: 1 }
      manifest_order: { type: integer, minimum: 0 }
      governed_sub_spec_path: { type: string, minLength: 1 }
      sub_spec_hash: { type: string, pattern: "^[a-f0-9]{64}$" }
      preparation_status: { const: prepared }
      provenance: { $ref: "#/$defs/provenance" }
      payload_sha256: { type: string, pattern: "^[a-f0-9]{64}$" }
      plan_payload: { type: string, minLength: 1 }
x-coherence-checks:
  - preparation_status is prepared once a valid checkpoint is stored and cannot regress.
  - provenance hashes are SHA-256 of raw UTF-8 bytes and are stable across re-reads.
  - payload_sha256 is the SHA-256 of the exact UTF-8 payload bytes.
  - payload phase_id, contract version, completed status, and non-empty produced_outputs are enforced by the reused phase-output validator.
