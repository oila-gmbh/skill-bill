$schema: https://json-schema.org/draft/2020-12/schema
$id: https://skill-bill.dev/contracts/agent-addon-schema.yaml
title: Agent add-on manifest
description: Declares a governed, agent-targeted add-on source.
type: object
additionalProperties: false
required:
  - contract_version
  - slug
  - description
  - agent_ids
  - consumers
properties:
  contract_version:
    const: "1.0"
  slug:
    type: string
    pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$'
  description:
    type: string
    minLength: 1
    maxLength: 200
  agent_ids:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      type: string
      minLength: 1
  consumers:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      enum:
        - bill-feature
x-coherence-checks:
  - Kotlin contract version equals properties.contract_version.const.
  - Source directory name equals slug.
  - Description is trimmed, non-blank, and single-line.
  - agent-addon.yaml and content.md are regular files and the only authored entries.
  - Every agent id resolves through the existing InstallAgent registry.
  - Every consumer is supported by AgentAddonConsumer for this contract version.
  - Slugs are unique across the repository.
  - Canonical agent-addon.yaml source identities are unique across the repository.
