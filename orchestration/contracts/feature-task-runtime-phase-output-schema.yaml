# Feature-task-runtime per-phase output schema (canonical source of truth).
#
# This file describes the structured output every phase of the experimental
# `feature-task-runtime` pipeline must emit before the runtime advances to the
# next phase. It is authored in YAML for human readability and consumed as a
# JSON Schema (Draft 2020-12) by the Kotlin runtime
# (`FeatureTaskRuntimePhaseOutputSchemaValidator` in `runtime-infra-fs`).
#
# Why this exists:
#
# - The runtime raises the per-phase progression gate from PRESENCE to
#   VALIDITY: a phase cannot complete or advance unless its output validates
#   against this schema. Empty (`{}`), malformed, or partially-filled output
#   blocks the run loudly with the offending phase id.
#
# What lives here vs. in Kotlin:
#
# - This file defines the REQUIRED-VS-OPTIONAL fields and VALUE-LEVEL
#   constraints of a single phase's output envelope — anything expressible in
#   pure JSON Schema (non-empty strings, enums, the pinned contract version).
# - The phase DAG, the three handoff layers, and latest-iteration selection
#   are pure-domain concerns and live in
#   `skillbill.workflow.taskruntime` (`runtime-domain`), not here.
#
# Versioning rule:
#
# - `contract_version` is pinned by `FEATURE_TASK_RUNTIME_CONTRACT_VERSION`
#   in
#   `runtime-kotlin/runtime-contracts/src/main/kotlin/skillbill/contracts/workflow/FeatureTaskRuntimeSchemaPaths.kt`.
# - The parity test `FeatureTaskRuntimePhaseOutputSchemaContractVersionTest`
#   fails the build if they diverge. To bump the contract, edit BOTH
#   constants in the same change.
$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://skill-bill.dev/contracts/feature-task-runtime-phase-output-schema.yaml"
title: "Feature-task-runtime phase output"
description: >
  Schema for the structured output a single feature-task-runtime phase emits
  at its completion seam. The runtime validates this output before recording
  the phase as complete and assembling the next phase's handoff. Run-invariant,
  upstream-output, and derived-context handoff layers are modeled in the
  domain; this schema governs only the per-phase output artifact itself.
type: object
additionalProperties: false
$defs:
  phaseStatus:
    type: string
    enum:
      - completed
      - blocked
      - failed
  failureDisposition:
    type: string
    enum:
      - retryable
      - non_retryable_policy_conflict
      - needs_user_action
      - process_failure
      - invalid_output
  compactAuditGap:
    type: object
    additionalProperties: false
    required: [criterion, severity, location, issue, fix]
    properties:
      criterion:
        type: string
        pattern: "^AC-[0-9]{3}$"
      severity:
        enum: [blocker, major]
      location:
        description: "Compact ClassName or ClassName.memberName reference; never a fully-qualified name."
        type: string
        minLength: 1
        maxLength: 256
        pattern: "^[A-Za-z_][A-Za-z0-9_$]*(?:\\.[A-Za-z_][A-Za-z0-9_$]*)?$"
      file:
        description: "Optional basename used only when the compact class/member reference is ambiguous."
        type: string
        minLength: 1
        maxLength: 128
        pattern: "^[A-Za-z0-9_.-]+$"
      issue:
        type: string
        minLength: 1
        maxLength: 1024
        pattern: ".*\\S.*"
      fix:
        type: string
        minLength: 1
        maxLength: 1024
        pattern: ".*\\S.*"
required:
  - contract_version
  - phase_id
  - status
  - summary
  - produced_outputs
properties:
  contract_version:
    type: string
    const: "0.3"
  phase_id:
    type: string
    minLength: 1
  status:
    $ref: "#/$defs/phaseStatus"
  failure_disposition:
    description: >
      Typed failure behavior for blocked or failed phase output. Agents should
      omit it for completed output. The runtime treats policy conflicts and
      user-action requirements as durable non-retryable blocks; retryable,
      process-failure, and invalid-output dispositions may be relaunched under
      the applicable bounded retry policy. Optional for compatibility with
      existing durable 0.1 outputs; absent blocked output defaults to
      needs_user_action and absent failed output defaults to retryable.
    $ref: "#/$defs/failureDisposition"
  summary:
    type: string
    minLength: 1
  produced_outputs:
    type: object
    description: >
      Phase-specific structured payload forwarded to downstream phases as a
      declared upstream output. Value shapes are phase-specific by contract
      (strings, arrays, nested objects all occur), so they are left open; the
      envelope guarantees the field is present, carries at least one entry
      (an empty `{}` blocks the run), and uses only non-empty string keys.
      Mutating phases (e.g. `implement`) additionally MUST carry a
      reconciliation report — a `reconciled_state` object (or a `reconciled`
      entry) with `reconciled` set to true plus evidence that the changed
      files are at their intended target state — so the runtime can verify
      (not assume) the mutating-phase idempotency contract: the phase
      reconciled the working tree to target rather than re-applying or
      silently skipping. The runtime enforces this per-phase reconciliation
      check at the gate; it is documented here for authors. This is a
      description-only clarification and adds no JSON-Schema constraint.
    minProperties: 1
    propertyNames:
      type: string
      minLength: 1
  derived_notes:
    description: >
      Optional free-text note. Either absent (not set) or a non-empty string;
      `null` is not a valid value.
    type: string
    minLength: 1
  verdict:
    description: >
      Optional structured verdict emitted by a verifying phase (e.g. `review`)
      that the runtime reads to decide whether to advance or take a remediation
      backward edge. For `review` the values are `approved` (no unresolved
      Blocker findings) or `changes_requested` (unresolved Blocker findings
      present); Major, Minor, and Nit findings never block advancing. The
      runtime classifies the verdict from the carried review
      findings, which travel inside `produced_outputs` (e.g. a `findings` array
      of severity/message entries) and are forwarded into the `implement_fix`
      handoff. For `audit` the values are `satisfied` (every acceptance criterion
      met with no Blocker or Major gap) or `gaps_found` (one or more Blocker or Major gaps);
      the runtime classifies the verdict from the compact `produced_outputs.gaps` array and derives
      the durable remediation handoff on the `audit_gap` backward edge. Minor
      and Nit findings travel separately in `non_blocking_findings` and never reopen implementation.
      Either absent (not set) or a
      non-empty string; `null` is not a valid value. The field itself is
      additive and optional — existing phase outputs that omit it still
      validate — but the `audit` phase constraints in `allOf` make a
      `gaps_found` verdict requires one or more compact gaps. This breaking audit-output shape is why
      contract_version is `0.3`; workflows created under an earlier version require a hard reset.
    type: string
    minLength: 1
allOf:
  - if:
      properties:
        phase_id: { const: audit }
      required: [phase_id]
    then:
      required: [verdict]
      properties:
        verdict: { enum: [satisfied, gaps_found] }
        produced_outputs:
          type: object
          required: [gaps]
          not:
            anyOf:
              - required: [unmet_criteria]
              - required: [audit_repair_plan]
              - required: [prior_gap_dispositions]
              - required: [failing_criteria]
          properties:
            gaps:
              type: array
              maxItems: 50
              items: { $ref: "#/$defs/compactAuditGap" }
            non_blocking_findings:
              description: >
                Advisory sink for Minor and Nit findings. The runtime never reads entry bodies, so
                entries also accept the compact-gap vocabulary and tolerate extra keys instead of
                failing the phase gate. `severity` stays constrained because a Blocker or Major
                finding parked here would escape the gap ledger.
              type: array
              items:
                type: object
                required: [severity]
                properties:
                  severity: { enum: [minor, nit] }
                  acceptance_criterion_ref: { type: string, minLength: 1, pattern: ".*\\S.*" }
                  criterion: { type: string, minLength: 1, pattern: ".*\\S.*" }
                  message: { type: string, minLength: 1, pattern: ".*\\S.*" }
                  issue: { type: string, minLength: 1, pattern: ".*\\S.*" }
                  fix: { type: string, minLength: 1, pattern: ".*\\S.*" }
                  file: { type: string, minLength: 1, pattern: ".*\\S.*" }
                  location: { type: string, minLength: 1, pattern: ".*\\S.*" }
  - if:
      properties:
        phase_id: { const: audit }
        verdict: { const: satisfied }
      required: [phase_id, verdict]
    then:
      properties:
        produced_outputs:
          type: object
          properties:
            gaps: { type: array, maxItems: 0 }
  - if:
      properties:
        phase_id: { const: audit }
        verdict: { const: gaps_found }
      required: [phase_id, verdict]
    then:
      properties:
        produced_outputs:
          type: object
          properties:
            gaps:
              type: array
              minItems: 1
