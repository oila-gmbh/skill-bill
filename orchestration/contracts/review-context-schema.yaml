$schema: https://json-schema.org/draft/2020-12/schema
$id: https://skill-bill.dev/contracts/review-context-schema.yaml
title: Review context contract
description: Strict bounded immutable context exchanged by delegated review participants.
oneOf:
  - $ref: "#/$defs/parent_packet"
  - $ref: "#/$defs/assignment"
  - $ref: "#/$defs/launch"
  - $ref: "#/$defs/budget_outcome"
  - $ref: "#/$defs/accounting_summary"
$defs:
  digest: { type: string, pattern: "^[a-f0-9]{64}$" }
  path: { type: string, minLength: 1, pattern: "^(?!/)(?!.*(?:^|/)\.\.(?:/|$)).+$" }
  strings:
    type: array
    uniqueItems: true
    items: { type: string, minLength: 1 }
  header:
    type: object
    required: [contract_version, kind, review_id, packet_digest]
    properties:
      contract_version: { const: "0.1" }
      kind: { type: string }
      review_id: { type: string, minLength: 1 }
      packet_digest: { $ref: "#/$defs/digest" }
  hunk:
    type: object
    additionalProperties: false
    required: [path, old_start, old_count, new_start, new_count, content]
    properties:
      path: { $ref: "#/$defs/path" }
      old_start: { type: integer, minimum: 0 }
      old_count: { type: integer, minimum: 0 }
      new_start: { type: integer, minimum: 0 }
      new_count: { type: integer, minimum: 0 }
      content: { type: string }
  parent_packet:
    type: object
    additionalProperties: false
    required: [contract_version, kind, review_id, packet_digest, repository_identity, base_revision, head_revision, status, selected_lanes, changed_hunks]
    properties:
      contract_version: { const: "0.1" }
      kind: { const: parent_packet }
      review_id: { type: string, minLength: 1 }
      packet_digest: { $ref: "#/$defs/digest" }
      repository_identity: { type: string, minLength: 1 }
      base_revision: { type: string, minLength: 1 }
      head_revision: { type: string, minLength: 1 }
      status: { type: string }
      stack: { type: [string, "null"] }
      pack: { type: [string, "null"] }
      add_ons: { $ref: "#/$defs/strings" }
      selected_lanes: { $ref: "#/$defs/strings", minItems: 1 }
      changed_hunks: { type: array, items: { $ref: "#/$defs/hunk" } }
  assignment:
    type: object
    additionalProperties: false
    required: [contract_version, kind, review_id, packet_digest, assignment_digest, lane, base_revision, head_revision, assigned_paths, assigned_hunks, criteria_references, matched_rules, evidence_targets]
    properties:
      contract_version: { const: "0.1" }
      kind: { const: assignment }
      review_id: { type: string, minLength: 1 }
      packet_digest: { $ref: "#/$defs/digest" }
      assignment_digest: { $ref: "#/$defs/digest" }
      lane: { type: string, minLength: 1 }
      base_revision: { type: string, minLength: 1 }
      head_revision: { type: string, minLength: 1 }
      assigned_paths: { type: array, uniqueItems: true, items: { $ref: "#/$defs/path" } }
      assigned_hunks: { $ref: "#/$defs/strings" }
      criteria_references: { $ref: "#/$defs/strings" }
      matched_rules: { $ref: "#/$defs/strings" }
      evidence_targets: { $ref: "#/$defs/strings" }
  launch:
    type: object
    additionalProperties: false
    required: [contract_version, kind, review_id, packet_digest, assignment_digest, lane, base_revision, head_revision, specialist_contract, rubric, assigned_paths, assigned_hunks, criteria_references, matched_rules, evidence_targets, broker_id, isolation, budget]
    properties:
      contract_version: { const: "0.1" }
      kind: { const: launch }
      review_id: { type: string, minLength: 1 }
      packet_digest: { $ref: "#/$defs/digest" }
      assignment_digest: { $ref: "#/$defs/digest" }
      lane: { type: string, minLength: 1 }
      base_revision: { type: string, minLength: 1 }
      head_revision: { type: string, minLength: 1 }
      specialist_contract: { type: string, minLength: 1 }
      rubric: { type: string, minLength: 1 }
      assigned_paths: { type: array, uniqueItems: true, items: { $ref: "#/$defs/path" } }
      assigned_hunks: { $ref: "#/$defs/strings" }
      criteria_references: { $ref: "#/$defs/strings" }
      matched_rules: { $ref: "#/$defs/strings" }
      evidence_targets: { $ref: "#/$defs/strings" }
      broker_id: { type: string, minLength: 1 }
      isolation: { const: fresh }
      budget: { $ref: "#/$defs/budget" }
  budget:
    type: object
    additionalProperties: false
    required: [max_parent_packet_bytes, max_lane_launch_bytes, max_lane_evidence_bytes, max_evidence_result_bytes, max_lane_result_bytes, max_assignment_expansions]
    properties:
      max_parent_packet_bytes: { type: integer, minimum: 1 }
      max_lane_launch_bytes: { type: integer, minimum: 1 }
      max_lane_evidence_bytes: { type: integer, minimum: 1 }
      max_evidence_result_bytes: { type: integer, minimum: 1 }
      max_lane_result_bytes: { type: integer, minimum: 1 }
      max_assignment_expansions: { type: integer, minimum: 0 }
  budget_outcome:
    type: object
    additionalProperties: false
    required: [contract_version, kind, review_id, packet_digest, assignment_digest, lane, terminal_outcome, budget_kind, configured_limit, observed_value, enforceable]
    properties:
      contract_version: { const: "0.1" }
      kind: { const: budget_outcome }
      review_id: { type: string, minLength: 1 }
      packet_digest: { $ref: "#/$defs/digest" }
      assignment_digest: { $ref: "#/$defs/digest" }
      lane: { type: string, minLength: 1 }
      terminal_outcome: { enum: [review_context_budget_exceeded, budget_regression] }
      budget_kind: { type: string, minLength: 1 }
      configured_limit: { type: integer, minimum: 0 }
      observed_value: { type: integer, minimum: 0 }
      enforceable: { type: boolean }
  usage:
    type: object
    additionalProperties: false
    properties:
      input_tokens: { type: integer, minimum: 0 }
      cached_input_tokens: { type: integer, minimum: 0 }
      output_tokens: { type: integer, minimum: 0 }
      reasoning_tokens: { type: integer, minimum: 0 }
      total_tokens: { type: integer, minimum: 0 }
      fresh_token_approximation: { type: integer, minimum: 0 }
  accounting_summary:
    type: object
    additionalProperties: false
    required: [contract_version, kind, review_id, packet_digest, lanes, aggregate_usage, budget_regression]
    properties:
      contract_version: { const: "0.1" }
      kind: { const: accounting_summary }
      review_id: { type: string, minLength: 1 }
      packet_digest: { $ref: "#/$defs/digest" }
      lanes:
        type: array
        items:
          type: object
          additionalProperties: false
          required: [lane, assignment_digest, launch_bytes, evidence_bytes, result_bytes, expansions, terminal_outcome, usage]
          properties:
            lane: { type: string, minLength: 1 }
            assignment_digest: { $ref: "#/$defs/digest" }
            launch_bytes: { type: integer, minimum: 0 }
            evidence_bytes: { type: integer, minimum: 0 }
            result_bytes: { type: integer, minimum: 0 }
            expansions: { type: integer, minimum: 0 }
            terminal_outcome: { enum: [completed, review_context_budget_exceeded, budget_regression, failed] }
            usage: { $ref: "#/$defs/usage" }
      aggregate_usage: { $ref: "#/$defs/usage" }
      budget_regression: { type: boolean }
x-coherence-checks:
  - Digests are SHA-256 over canonical UTF-8 serialization with digest fields omitted.
  - Assignment revisions and lane identity equal their parent packet values.
  - Assignment paths and hunks are owned by the parent packet and remain unique.
  - Observed budget values exceed their configured limit for exceeded outcomes.
  - Durable projections omit prompts, diffs, source, project guidance, and tool-output bodies.
