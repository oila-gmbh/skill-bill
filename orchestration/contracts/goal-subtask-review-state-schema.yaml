$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://skill-bill.dev/contracts/goal-subtask-review-state-schema.yaml"
title: "Goal subtask review state"
description: >
  Durable, child-owned review state for one decomposed feature-task runtime
  subtask. It pins the local review baseline, selected execution mode, pass
  accounting, compact safe summaries, and the references to full review input
  and result artifacts.
type: object
additionalProperties: false
required:
  - contract_version
  - review_base_sha
  - baseline_untracked_paths
  - code_review_mode
  - completed_pass_count
  - disposition
  - pass_results
  - emitted_pass_count
properties:
  contract_version:
    type: string
    const: "0.1"
  review_base_sha:
    type: string
    pattern: "^[0-9a-f]{40}([0-9a-f]{24})?$"
  baseline_untracked_paths:
    type: array
    items:
      type: string
      minLength: 1
    uniqueItems: true
  code_review_mode:
    description: Immutable selected mode for the initial review pass; any later pass executes inline.
    type: string
    enum: [auto, inline, delegated]
  reserved_pass_number:
    type: integer
    minimum: 1
    maximum: 2
  completed_pass_count:
    type: integer
    minimum: 0
    maximum: 2
  disposition:
    type: string
    enum: [pending, review_cap_reached]
  review_input_artifact:
    type: string
    minLength: 1
  pass_results:
    type: array
    maxItems: 2
    items:
      type: object
      additionalProperties: false
      required:
        - pass_number
        - verdict
        - review_result_artifact
        - unresolved_finding_count
        - findings
      properties:
        pass_number:
          type: integer
          minimum: 1
          maximum: 2
        verdict:
          type: string
          enum: [approved, changes_requested, review_cap_reached]
        executed_mode:
          type: string
          enum: [auto, inline, delegated]
        review_result_artifact:
          type: string
          minLength: 1
        unresolved_finding_count:
          type: integer
          minimum: 0
        findings:
          type: array
          items:
            type: object
            additionalProperties: false
            required: [severity, label, text]
            properties:
              severity:
                type: string
                enum: [blocker, major, minor, nit]
              label:
                type: string
                minLength: 1
              text:
                type: string
                minLength: 1
  emitted_pass_count:
    type: integer
    minimum: 0
    maximum: 2
x-coherence-checks:
  - review_base_sha and baseline_untracked_paths are immutable after initial child creation.
  - reserved_pass_number is completed_pass_count + 1 and prevents a crash/resume from resetting accounting.
  - pass_results is ordered by pass_number and has exactly completed_pass_count entries.
  - When present, pass one executed_mode equals code_review_mode and pass two executed_mode is inline.
  - review_cap_reached is valid only after pass two completes with unresolved Blocker findings; Major and lower severities never reach the cap disposition.
  - emitted_pass_count is an acknowledgement watermark for compact parent-goal summaries.
