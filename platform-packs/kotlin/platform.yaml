platform: kotlin
contract_version: "1.2"
display_name: Kotlin

routing_signals:
  strong:
    - ".kt"
    - "*.kt"
    - ".kts"
    - "*.kts"
    - "build.gradle"
    - "build.gradle.kts"
    - "settings.gradle.kts"
    - "gradle/libs.versions.toml"
    - "detekt.yml"
    - "kotlin/"
  tie_breakers:
    - "Prefer this Kotlin pack when Kotlin/JVM source and Gradle Kotlin markers dominate the owned diff."
    - "Do not prefer this pack over the adjacent KMP pack when Android/KMP markers (androidMain, iosMain, AndroidManifest.xml, expect/actual) establish KMP ownership."
    - "Exclude generated and vendored files from dominance scoring."

declared_code_review_areas:
  - architecture
  - performance
  - platform-correctness
  - security
  - testing
  - api-contracts
  - persistence
  - reliability

declared_files:
  baseline: code-review/bill-kotlin-code-review/content.md
  areas:
    architecture: code-review/bill-kotlin-code-review-architecture/content.md
    performance: code-review/bill-kotlin-code-review-performance/content.md
    platform-correctness: code-review/bill-kotlin-code-review-platform-correctness/content.md
    security: code-review/bill-kotlin-code-review-security/content.md
    testing: code-review/bill-kotlin-code-review-testing/content.md
    api-contracts: code-review/bill-kotlin-code-review-api-contracts/content.md
    persistence: code-review/bill-kotlin-code-review-persistence/content.md
    reliability: code-review/bill-kotlin-code-review-reliability/content.md

area_metadata:
  architecture:
    focus: "Kotlin use-case and transaction ownership, injected CoroutineScope lifecycles, internal visibility, and Gradle module boundaries"
  performance:
    focus: "Kotlin runBlocking and dispatcher starvation, Flow backpressure, eager collections, and ORM hydration costs"
  platform-correctness:
    focus: "Kotlin CancellationException propagation, SupervisorJob isolation, Mutex reentrancy, and StateFlow or SharedFlow delivery invariants"
  security:
    focus: "Kotlin dangerous input sinks, object authorization, tenant isolation, unsafe deserialization, and JWT verification"
  testing:
    focus: "Kotlin runTest virtual time, test dispatcher ordering, Flow sequence assertions, and real persistence effects"
  api-contracts:
    focus: "Kotlin explicitNulls and encodeDefaults compatibility, Jackson module behavior, validation, and stable error contracts"
  persistence:
    focus: "Kotlin Exposed newSuspendedTransaction boundaries, Spring proxy transactions, Hibernate sessions, and scoped atomic writes"
  reliability:
    focus: "Kotlin consumer supervision, TimeoutCancellationException classification, bounded replay, outbox ordering, and failure telemetry"

declared_quality_check_file: quality-check/bill-kotlin-code-check/content.md

