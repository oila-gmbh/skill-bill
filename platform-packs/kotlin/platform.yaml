platform: kotlin
contract_version: "1.2"
display_name: Kotlin

routing_signals:
  strong:
    - ".kt"
    - "*.kt"
    - "build.gradle.kts"
    - "kotlin/"
  tie_breakers:
    - "If Android/KMP markers (androidMain, iosMain, AndroidManifest.xml, expect/actual) are present, prefer the KMP pack."
    - "Otherwise route generic Kotlin/JVM libraries, CLIs, shared utilities, and backend/server Kotlin work to this pack."

declared_code_review_areas:
  - architecture
  - performance
  - platform-correctness
  - security
  - testing
  - api-contracts
  - persistence
  - reliability

declared_files:
  baseline: code-review/bill-kotlin-code-review/content.md
  areas:
    architecture: code-review/bill-kotlin-code-review-architecture/content.md
    performance: code-review/bill-kotlin-code-review-performance/content.md
    platform-correctness: code-review/bill-kotlin-code-review-platform-correctness/content.md
    security: code-review/bill-kotlin-code-review-security/content.md
    testing: code-review/bill-kotlin-code-review-testing/content.md
    api-contracts: code-review/bill-kotlin-code-review-api-contracts/content.md
    persistence: code-review/bill-kotlin-code-review-persistence/content.md
    reliability: code-review/bill-kotlin-code-review-reliability/content.md

area_metadata:
  architecture:
    focus: "architecture, boundaries, and dependency direction"
  performance:
    focus: "performance risks on hot paths, blocking I/O, and resource usage"
  platform-correctness:
    focus: "lifecycle, concurrency, threading, and logic correctness"
  security:
    focus: "secrets handling, auth, and sensitive-data exposure"
  testing:
    focus: "test coverage quality and regression protection"
  api-contracts:
    focus: "API contracts, request validation, and serialization"
  persistence:
    focus: "persistence, transactions, migrations, and data consistency"
  reliability:
    focus: "timeouts, retries, background work, and observability"

declared_quality_check_file: quality-check/bill-kotlin-code-check/content.md

