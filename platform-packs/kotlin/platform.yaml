platform: kotlin
contract_version: "1.1"
display_name: Kotlin

routing_signals:
  strong:
    - ".kt"
    - "build.gradle.kts"
    - "kotlin/"
  tie_breakers:
    - "If Android/KMP markers (androidMain, iosMain, AndroidManifest.xml, expect/actual) are present, prefer the KMP pack."
    - "Otherwise route generic Kotlin/JVM libraries, CLIs, shared utilities, and backend/server Kotlin work to this pack."

declared_code_review_areas:
  - architecture
  - performance
  - platform-correctness
  - security
  - testing
  - api-contracts
  - persistence
  - reliability

declared_files:
  baseline: code-review/bill-kotlin-code-review/SKILL.md
  areas:
    architecture: code-review/bill-kotlin-code-review-architecture/SKILL.md
    performance: code-review/bill-kotlin-code-review-performance/SKILL.md
    platform-correctness: code-review/bill-kotlin-code-review-platform-correctness/SKILL.md
    security: code-review/bill-kotlin-code-review-security/SKILL.md
    testing: code-review/bill-kotlin-code-review-testing/SKILL.md
    api-contracts: code-review/bill-kotlin-code-review-api-contracts/SKILL.md
    persistence: code-review/bill-kotlin-code-review-persistence/SKILL.md
    reliability: code-review/bill-kotlin-code-review-reliability/SKILL.md

area_metadata:
  architecture:
    focus: "architecture, boundaries, and dependency direction"
  performance:
    focus: "performance risks on hot paths, blocking I/O, and resource usage"
  platform-correctness:
    focus: "lifecycle, concurrency, threading, and logic correctness"
  security:
    focus: "secrets handling, auth, and sensitive-data exposure"
  testing:
    focus: "test coverage quality and regression protection"
  api-contracts:
    focus: "API contracts, request validation, and serialization"
  persistence:
    focus: "persistence, transactions, migrations, and data consistency"
  reliability:
    focus: "timeouts, retries, background work, and observability"

declared_quality_check_file: quality-check/bill-kotlin-quality-check/SKILL.md
