platform: "ios"
contract_version: "1.2"
display_name: "iOS"

routing_signals:
  strong:
    - ".xcodeproj"
    - ".xcworkspace"
    - ".swift"
    - "*.swift"
    - "project.pbxproj"
    - "Info.plist"
    - "Podfile"
    - ".swiftlint.yml"
    - "fastlane/Fastfile"
    - "import SwiftUI"
    - "import UIKit"
    - "iOSApplicationExtension"
  tie_breakers:
    - "Package.swift alone is not a strong signal (ambiguous with server-side/macOS-only Swift); only route on it when the repo root also has an .xcodeproj/.xcworkspace."
    - "A diff touching a local SPM package with no UIKit/SwiftUI import is still iOS-scoped when the repo root contains an .xcodeproj/.xcworkspace that consumes that package."
    - "Never match on iosMain, androidMain, commonMain, expect/actual — those are KMP shared-source-set markers, not native iOS markers."
    - "Prefer iOS when native Swift sources, Xcode workspace/project metadata, Apple platform configuration, and iOS framework imports dominate the changed product surface."
    - "Do not prefer iOS in an adjacent mixed-stack repository when another dominant stack owns the changed product surface and Swift appears only in bridging, tooling, or unrelated support code."
    - "Exclude generated sources, vendored dependencies, Pods, .build content, and build outputs from dominance scoring unless the generator or vendored contract is intentionally changed."

declared_code_review_areas:
  - "api-contracts"
  - "architecture"
  - "performance"
  - "persistence"
  - "platform-correctness"
  - "reliability"
  - "security"
  - "testing"
  - "ui"
  - "ux-accessibility"

declared_files:
  baseline: "code-review/bill-ios-code-review/content.md"
  areas:
    api-contracts: "code-review/bill-ios-code-review-api-contracts/content.md"
    architecture: "code-review/bill-ios-code-review-architecture/content.md"
    performance: "code-review/bill-ios-code-review-performance/content.md"
    persistence: "code-review/bill-ios-code-review-persistence/content.md"
    platform-correctness: "code-review/bill-ios-code-review-platform-correctness/content.md"
    reliability: "code-review/bill-ios-code-review-reliability/content.md"
    security: "code-review/bill-ios-code-review-security/content.md"
    testing: "code-review/bill-ios-code-review-testing/content.md"
    ui: "code-review/bill-ios-code-review-ui/content.md"
    ux-accessibility: "code-review/bill-ios-code-review-ux-accessibility/content.md"
area_metadata:
  api-contracts:
    focus: "REST/Codable decoding and Apollo GraphQL schema/cache compatibility"
  architecture:
    focus: "Swift module boundaries, dependency injection, and SPM package ownership"
  performance:
    focus: "SwiftUI recomputation, ImageIO downsampling, and import-loop memory pressure"
  persistence:
    focus: "Core Data and SwiftData context/migration safety plus GRDB transaction consistency"
  platform-correctness:
    focus: "Swift actor isolation, Sendable crossings, task cancellation, and iOS lifecycle correctness"
  reliability:
    focus: "BGTaskScheduler, background URLSession relaunch recovery, expiration, and interrupted sync"
  security:
    focus: "Keychain accessibility, ATS exceptions, privacy-safe Logger output, and pasteboard expiry"
  testing:
    focus: "XCTest, snapshot intent, reducer behavior, and SQL regression coverage"
  ui:
    focus: "SwiftUI state ownership, navigation, rendering identity, and deployment-version fallbacks"
  ux-accessibility:
    focus: "VoiceOver semantics, Dynamic Type, localization completeness, and task completion"

declared_quality_check_file: "quality-check/bill-ios-code-check/content.md"

addon_usage:
  code-review/bill-ios-code-review:
    - slug: offline-first
      entrypoint: offline-first-review.md
      companion_pointers:
        - offline-sync-consistency.md
        - offline-conflict-resolution.md
        - offline-background-reliability.md
  code-review/bill-ios-code-review-persistence:
    - slug: offline-first
      entrypoint: offline-first-review.md
      companion_pointers:
        - offline-sync-consistency.md
        - offline-conflict-resolution.md
  code-review/bill-ios-code-review-reliability:
    - slug: offline-first
      entrypoint: offline-first-review.md
      companion_pointers:
        - offline-background-reliability.md
        - offline-sync-consistency.md
  code-review/bill-ios-code-review-platform-correctness:
    - slug: offline-first
      entrypoint: offline-first-review.md
      companion_pointers:
        - offline-conflict-resolution.md

