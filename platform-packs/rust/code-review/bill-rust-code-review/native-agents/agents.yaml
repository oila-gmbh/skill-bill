contract_version: "0.1"
agents:
  - name: bill-rust-code-review-api-contracts
    description: "Rust API contract reviewer for serde models, validation, HTTP or RPC mapping, error payloads, schemas, and compatibility. Returns the shared Risk Register."
    compose: governed-content
  - name: bill-rust-code-review-architecture
    description: "Rust architecture reviewer for crate and workspace boundaries, module visibility, trait ownership, dependency direction, and Cargo features. Returns the shared Risk Register."
    compose: governed-content
  - name: bill-rust-code-review-performance
    description: "Rust performance reviewer for allocation, cloning, contention, blocking work, async scheduling, I/O, buffering, and throughput. Returns the shared Risk Register."
    compose: governed-content
  - name: bill-rust-code-review-persistence
    description: "Rust persistence reviewer for transactions, migrations, query behavior, locking, connection lifecycle, and consistency. Returns the shared Risk Register."
    compose: governed-content
  - name: bill-rust-code-review-platform-correctness
    description: "Rust correctness reviewer for ownership, borrowing, lifetimes, unsafe invariants, traits, errors, panics, and async behavior. Returns the shared Risk Register."
    compose: governed-content
  - name: bill-rust-code-review-reliability
    description: "Rust reliability reviewer for task lifecycle, cancellation, retries, timeouts, backpressure, cleanup, and observability. Returns the shared Risk Register."
    compose: governed-content
  - name: bill-rust-code-review-security
    description: "Rust security reviewer for unsafe and FFI boundaries, auth, parsers, secrets, command execution, supply chain, and sensitive data. Returns the shared Risk Register."
    compose: governed-content
  - name: bill-rust-code-review-testing
    description: "Rust testing reviewer for unit, integration, doc, property, async, feature-matrix, and regression tests. Returns the shared Risk Register."
    compose: governed-content
  - name: bill-rust-code-review-ui
    description: "Rust UI reviewer for web, desktop, terminal, embedded, WASM, and server-rendered interaction correctness. Returns the shared Risk Register."
    compose: governed-content
  - name: bill-rust-code-review-ux-accessibility
    description: "Rust UX and accessibility reviewer for semantics, labels, keyboard behavior, focus, feedback, localization, and assistive technology. Returns the shared Risk Register."
    compose: governed-content
