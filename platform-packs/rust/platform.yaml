platform: rust
contract_version: "1.2"
display_name: Rust

routing_signals:
  strong:
    - "Cargo.toml"
    - "Cargo.lock"
    - ".rs"
    - "*.rs"
    - "build.rs"
    - "rust-toolchain.toml"
    - "rustfmt.toml"
    - "clippy.toml"
    - "deny.toml"
    - ".cargo/config.toml"
  tie_breakers:
    - "Prefer Rust when Cargo package/workspace metadata or first-party Rust source files dominate the changed product surface."
    - "Do not prefer Rust when it appears only as FFI bindings, wasm build artifacts, generated sources, or incidental tooling around another dominant stack."
    - "Exclude target/ build output, generated sources, and vendored crates or dependency trees from dominance scoring."

declared_code_review_areas:
  - api-contracts
  - architecture
  - performance
  - persistence
  - platform-correctness
  - reliability
  - security
  - testing
  - ui
  - ux-accessibility

declared_files:
  baseline: code-review/bill-rust-code-review/content.md
  areas:
    api-contracts: code-review/bill-rust-code-review-api-contracts/content.md
    architecture: code-review/bill-rust-code-review-architecture/content.md
    performance: code-review/bill-rust-code-review-performance/content.md
    persistence: code-review/bill-rust-code-review-persistence/content.md
    platform-correctness: code-review/bill-rust-code-review-platform-correctness/content.md
    reliability: code-review/bill-rust-code-review-reliability/content.md
    security: code-review/bill-rust-code-review-security/content.md
    testing: code-review/bill-rust-code-review-testing/content.md
    ui: code-review/bill-rust-code-review-ui/content.md
    ux-accessibility: code-review/bill-rust-code-review-ux-accessibility/content.md

area_metadata:
  api-contracts:
    focus: "Rust HTTP/RPC contracts, serde models, validation, errors, and compatibility"
  architecture:
    focus: "Rust crate/workspace boundaries, module visibility, dependency direction, traits, and feature composition"
  performance:
    focus: "Rust allocation, copying, locking, async scheduling, I/O, and hot-path resource use"
  persistence:
    focus: "Rust database clients, transactions, migrations, locking, and data consistency"
  platform-correctness:
    focus: "Rust ownership, borrowing, lifetimes, unsafe invariants, errors, panics, traits, and async correctness"
  reliability:
    focus: "Rust task lifecycle, cancellation, backpressure, retries, timeouts, cleanup, and observability"
  security:
    focus: "Rust unsafe and FFI boundaries, auth, parsing, secrets, dependency risk, and sensitive logs"
  testing:
    focus: "Rust unit, integration, doc, property, concurrency, feature-matrix, and regression tests"
  ui:
    focus: "Rust web, desktop, terminal, embedded, and server-rendered UI correctness"
  ux-accessibility:
    focus: "Rust UI semantics, keyboard and focus behavior, feedback, localization, and assistive technology"

declared_quality_check_file: quality-check/bill-rust-code-check/content.md

pointers:
  code-review/bill-rust-code-review:
    - name: review-orchestrator.md
      target: orchestration/review-orchestrator/PLAYBOOK.md
    - name: review-delegation.md
      target: orchestration/review-delegation/PLAYBOOK.md
    - name: review-scope.md
      target: orchestration/review-scope/PLAYBOOK.md
    - name: shell-ceremony.md
      target: orchestration/shell-content-contract/shell-ceremony.md
    - name: specialist-contract.md
      target: orchestration/review-orchestrator/specialist-contract.md
    - name: stack-routing.md
      target: orchestration/stack-routing/PLAYBOOK.md
    - name: telemetry-contract.md
      target: orchestration/telemetry-contract/PLAYBOOK.md
  code-review/bill-rust-code-review-api-contracts: &specialist-pointers
    - name: review-orchestrator.md
      target: orchestration/review-orchestrator/PLAYBOOK.md
    - name: shell-ceremony.md
      target: orchestration/shell-content-contract/shell-ceremony.md
    - name: telemetry-contract.md
      target: orchestration/telemetry-contract/PLAYBOOK.md
  code-review/bill-rust-code-review-architecture: *specialist-pointers
  code-review/bill-rust-code-review-performance: *specialist-pointers
  code-review/bill-rust-code-review-persistence: *specialist-pointers
  code-review/bill-rust-code-review-platform-correctness: *specialist-pointers
  code-review/bill-rust-code-review-reliability: *specialist-pointers
  code-review/bill-rust-code-review-security: *specialist-pointers
  code-review/bill-rust-code-review-testing: *specialist-pointers
  code-review/bill-rust-code-review-ui: *specialist-pointers
  code-review/bill-rust-code-review-ux-accessibility: *specialist-pointers
  quality-check/bill-rust-code-check:
    - name: shell-ceremony.md
      target: orchestration/shell-content-contract/shell-ceremony.md
