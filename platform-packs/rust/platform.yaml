platform: rust
contract_version: "1.2"
display_name: Rust

routing_signals:
  strong:
    - "Cargo.toml"
    - "Cargo.lock"
    - ".rs"
    - "*.rs"
    - "build.rs"
    - "rust-toolchain.toml"
    - "rustfmt.toml"
    - "clippy.toml"
    - "deny.toml"
    - ".cargo/config.toml"
  tie_breakers:
    - "Prefer Rust when Cargo workspace or package metadata and first-party Rust source files dominate the changed product surface."
    - "Do not prefer Rust where it appears only as FFI bindings, wasm build tooling or artifacts, generated code, or vendored crates around another dominant stack."
    - "Exclude target/ build output and vendored dependency trees from dominance scoring."

declared_code_review_areas:
  - api-contracts
  - architecture
  - performance
  - persistence
  - platform-correctness
  - reliability
  - security
  - testing
  - ui
  - ux-accessibility

declared_files:
  baseline: code-review/bill-rust-code-review/content.md
  areas:
    api-contracts: code-review/bill-rust-code-review-api-contracts/content.md
    architecture: code-review/bill-rust-code-review-architecture/content.md
    performance: code-review/bill-rust-code-review-performance/content.md
    persistence: code-review/bill-rust-code-review-persistence/content.md
    platform-correctness: code-review/bill-rust-code-review-platform-correctness/content.md
    reliability: code-review/bill-rust-code-review-reliability/content.md
    security: code-review/bill-rust-code-review-security/content.md
    testing: code-review/bill-rust-code-review-testing/content.md
    ui: code-review/bill-rust-code-review-ui/content.md
    ux-accessibility: code-review/bill-rust-code-review-ux-accessibility/content.md
area_metadata:
  api-contracts:
    focus: "Rust trait, FFI, serde, wire-format, and compatibility contracts"
  architecture:
    focus: "Rust crate and workspace boundaries, trait ownership, dependency direction, and feature architecture"
  performance:
    focus: "Rust allocation, cloning, locking, async scheduling, I/O, and hot-path behavior"
  persistence:
    focus: "Rust database clients, transactions, migrations, locking, and durable data consistency"
  platform-correctness:
    focus: "Rust ownership, borrowing, lifetimes, error semantics, concurrency, and runtime correctness"
  reliability:
    focus: "Rust cancellation, backpressure, retries, shutdown, observability, and degradation behavior"
  security:
    focus: "Rust unsafe boundaries, auth, parsing, secrets, dependencies, FFI, and sensitive data"
  testing:
    focus: "Rust unit, integration, doc, feature-matrix, concurrency, and regression tests"
  ui:
    focus: "Rust wasm, server-rendered, desktop GUI, terminal UI, and interactive output"
  ux-accessibility:
    focus: "Rust UI semantics, keyboard and focus behavior, feedback, localization, and assistive access"

declared_quality_check_file: quality-check/bill-rust-code-check/content.md

