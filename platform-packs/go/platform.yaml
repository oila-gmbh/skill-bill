platform: go
contract_version: "1.2"
display_name: Go

routing_signals:
  strong:
    - "go.mod"
    - "go.sum"
    - "go.work"
    - "go.work.sum"
    - ".go"
    - "*.go"
    - "Gopkg.toml"
    - "Gopkg.lock"
    - "golangci.yml"
    - ".golangci.yml"
    - "staticcheck.conf"
  tie_breakers:
    - "Prefer Go when module/workspace metadata, Go source files, or Go test files dominate the changed product surface."
    - "Do not prefer Go for adjacent mixed repositories where Go appears only as generated clients, tooling, one-off scripts, or vendored dependencies around another dominant stack."
    - "Exclude vendor directories, generated protobuf/OpenAPI clients, build outputs, and generated mocks from dominance scoring unless the generator or generated contract is intentionally changed."

declared_code_review_areas:
  - api-contracts
  - architecture
  - performance
  - persistence
  - platform-correctness
  - reliability
  - security
  - testing
  - ui
  - ux-accessibility

declared_files:
  baseline: code-review/bill-go-code-review/content.md
  areas:
    api-contracts: code-review/bill-go-code-review-api-contracts/content.md
    architecture: code-review/bill-go-code-review-architecture/content.md
    performance: code-review/bill-go-code-review-performance/content.md
    persistence: code-review/bill-go-code-review-persistence/content.md
    platform-correctness: code-review/bill-go-code-review-platform-correctness/content.md
    reliability: code-review/bill-go-code-review-reliability/content.md
    security: code-review/bill-go-code-review-security/content.md
    testing: code-review/bill-go-code-review-testing/content.md
    ui: code-review/bill-go-code-review-ui/content.md
    ux-accessibility: code-review/bill-go-code-review-ux-accessibility/content.md
area_metadata:
  api-contracts:
    focus: "net/http and applicable RPC request validation, serialization, response ordering, idempotency, and compatibility"
  architecture:
    focus: "Package and module dependency direction, interface ownership, composition roots, component lifecycles, and goroutine scope ownership"
  performance:
    focus: "Measured pprof and benchmark evidence, allocations, retention, lock contention, scheduler pressure, batching, and bounded resources"
  persistence:
    focus: "database/sql row and transaction lifecycles, isolation, locking, pools, migrations, mapping, and applicable data libraries"
  platform-correctness:
    focus: "Goroutine exits, channel ownership, contexts, wrapped errors, typed nils, aliasing, defer, panic, races, and deadlocks"
  reliability:
    focus: "Graceful server and worker shutdown, deadlines, retries, backpressure, client lifecycles, observability, and partial failure"
  security:
    focus: "Authentication, authorization, template trust, bounded parsing, paths, processes, SSRF, uploads, secrets, and dependencies"
  testing:
    focus: "Behavioral regression proof, subtests, parallel capture, deterministic concurrency and time, race tests, fuzzing, and weak assertions"
  ui:
    focus: "Go-owned HTML templates and components, forms, fragments, rendering states, interactive CLI and TUI output"
  ux-accessibility:
    focus: "Labels, error association, focus, keyboard flow, semantics, live feedback, localization, and accessible terminal interaction"

declared_quality_check_file: quality-check/bill-go-code-check/content.md

