contract_version: "0.1"
agents:
  - name: bill-go-code-review-api-contracts
    description: "Go backend API contracts specialist code reviewer. Runs against request validation, response serialization, status-code mapping, error payloads, pagination, idempotency, and backward compatibility. Returns a Risk Register in the F-XXX bullet format."
    compose: governed-content
  - name: bill-go-code-review-architecture
    description: "Go architecture specialist code reviewer. Runs against layer boundaries, module ownership, dependency direction, source-of-truth consistency, framework coupling, and boundary-crossing composition. Returns a Risk Register in the F-XXX bullet format."
    compose: governed-content
  - name: bill-go-code-review-performance
    description: "Go performance specialist code reviewer. Runs against hot paths, N+1 queries, repeated database or network calls, serialization waste, memory pressure, buffering, and throughput regressions. Returns a Risk Register in the F-XXX bullet format."
    compose: governed-content
  - name: bill-go-code-review-persistence
    description: "Go backend persistence specialist code reviewer. Runs against transaction boundaries, ORM mappings, query scoping, migrations, lost updates, locking, bulk writes, and data consistency. Returns a Risk Register in the F-XXX bullet format."
    compose: governed-content
  - name: bill-go-code-review-platform-correctness
    description: "Go platform and correctness specialist code reviewer. Runs against business-logic correctness, state transitions, retry or replay behavior, edge cases, nullability, runtime safety, and invariant drift. Returns a Risk Register in the F-XXX bullet format."
    compose: governed-content
  - name: bill-go-code-review-reliability
    description: "Go backend reliability specialist code reviewer. Runs against timeouts, retries, queues, jobs, schedulers, caches, downstream failures, logging, metrics, tracing, and production failure behavior. Returns a Risk Register in the F-XXX bullet format."
    compose: governed-content
  - name: bill-go-code-review-security
    description: "Go security specialist code reviewer. Runs against auth and authorization logic, secret handling, sensitive logging, uploads, signed URLs, template rendering, deserialization, transport or storage assumptions, and credential exposure. Returns a Risk Register in the F-XXX bullet format."
    compose: governed-content
  - name: bill-go-code-review-testing
    description: "Go testing specialist code reviewer. Runs against regression protection, contract tests, deterministic retry and idempotency coverage, brittle tests, weak assertions, and low-value coverage-padding tests. Returns a Risk Register in the F-XXX bullet format."
    compose: governed-content
  - name: bill-go-code-review-ui
    description: "Go UI specialist code reviewer. Runs against html/template, templ, htmx-style fragments, terminal UI, dashboards, server-rendered form flows, validation rendering, navigation, modal, table, and admin-surface correctness. Returns a Risk Register in the F-XXX bullet format."
    compose: governed-content
  - name: bill-go-code-review-ux-accessibility
    description: "Go UX and accessibility specialist code reviewer. Runs against semantic structure, accessible names, form labels, keyboard behavior, focus management, validation feedback, localization-sensitive copy, and screen-reader affordances. Returns a Risk Register in the F-XXX bullet format."
    compose: governed-content
