contract_version: "0.1"
agents:
  - name: bill-go-code-review
    description: "Go baseline code reviewer. Runs the governed baseline review across the full owned diff before specialist findings are merged. Returns a Risk Register in the F-XXX bullet format."
    compose: governed-content
  - name: bill-go-code-review-api-contracts
    description: "Go api contracts specialist code reviewer. Runs against Go API contracts, request validation, serialization, handlers, RPC, and compatibility. Returns a Risk Register in the F-XXX bullet format."
    compose: governed-content
  - name: bill-go-code-review-architecture
    description: "Go architecture specialist code reviewer. Runs against Go package boundaries, dependency direction, module ownership, and service architecture. Returns a Risk Register in the F-XXX bullet format."
    compose: governed-content
  - name: bill-go-code-review-performance
    description: "Go performance specialist code reviewer. Runs against Go performance risks on hot paths, allocations, goroutines, I/O, and resource usage. Returns a Risk Register in the F-XXX bullet format."
    compose: governed-content
  - name: bill-go-code-review-persistence
    description: "Go persistence specialist code reviewer. Runs against Go SQL, ORM/query builders, migrations, transactions, locking, and data consistency. Returns a Risk Register in the F-XXX bullet format."
    compose: governed-content
  - name: bill-go-code-review-platform-correctness
    description: "Go platform correctness specialist code reviewer. Runs against Go runtime semantics, goroutines, channels, contexts, errors, nil handling, and logic correctness. Returns a Risk Register in the F-XXX bullet format."
    compose: governed-content
  - name: bill-go-code-review-reliability
    description: "Go reliability specialist code reviewer. Runs against Go contexts, timeouts, retries, workers, queues, external clients, observability, and degradation. Returns a Risk Register in the F-XXX bullet format."
    compose: governed-content
  - name: bill-go-code-review-security
    description: "Go security specialist code reviewer. Runs against Go auth/authz, secrets, unsafe parsing, command execution, uploads, templates, and sensitive logs. Returns a Risk Register in the F-XXX bullet format."
    compose: governed-content
  - name: bill-go-code-review-testing
    description: "Go testing specialist code reviewer. Runs against Go test quality, table tests, race-sensitive coverage, integration boundaries, and regression proof. Returns a Risk Register in the F-XXX bullet format."
    compose: governed-content
  - name: bill-go-code-review-ui
    description: "Go ui specialist code reviewer. Runs against Go-rendered UI, templates, admin surfaces, CLIs with interactive output, and dashboards. Returns a Risk Register in the F-XXX bullet format."
    compose: governed-content
  - name: bill-go-code-review-ux-accessibility
    description: "Go ux accessibility specialist code reviewer. Runs against Go server-rendered accessibility, forms, feedback, keyboard flow, and localization-sensitive UX. Returns a Risk Register in the F-XXX bullet format."
    compose: governed-content
