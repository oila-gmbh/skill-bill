platform: kmp
contract_version: "1.1"
display_name: KMP
governs_addons: true

routing_signals:
  strong:
    - 'kotlin("multiplatform")'
    - "org.jetbrains.kotlin.multiplatform"
    - "androidMain"
    - "iosMain"
    - "commonMain"
    - "AndroidManifest.xml"
    - "expect"
    - "actual"
  tie_breakers:
    - "If KMP or Android markers are strong, prefer this pack over generic Kotlin."
    - "Treat Android-only scope as KMP."
    - "If mixed with generic Kotlin, prefer this pack because it layers the Kotlin baseline internally."
  addon_signals:
    - "android-compose"
    - "android-navigation"
    - "android-interop"
    - "android-design-system"
    - "android-r8"

declared_code_review_areas:
  - ui
  - ux-accessibility

declared_files:
  baseline: code-review/bill-kmp-code-review/SKILL.md
  areas:
    ui: code-review/bill-kmp-code-review-ui/SKILL.md
    ux-accessibility: code-review/bill-kmp-code-review-ux-accessibility/SKILL.md
