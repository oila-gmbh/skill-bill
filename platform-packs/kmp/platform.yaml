platform: kmp
contract_version: "1.2"
display_name: KMP

routing_signals:
  strong:
    - ".kt"
    - "*.kt"
    - ".kts"
    - "*.kts"
    - 'kotlin("multiplatform")'
    - "org.jetbrains.kotlin.multiplatform"
    - "androidMain"
    - "iosMain"
    - "commonMain"
    - "AndroidManifest.xml"
    - "expect"
    - "actual"
  tie_breakers:
    - "If KMP or Android markers dominate, prefer this pack over generic Kotlin."
    - "Do not prefer this pack when adjacent Kotlin or Android signals dominate without multiplatform source sets."
    - "Exclude generated and vendored files when deciding routing dominance."

declared_code_review_areas:
  - platform-correctness
  - ui
  - ux-accessibility

declared_files:
  baseline: code-review/bill-kmp-code-review/content.md
  areas:
    platform-correctness: code-review/bill-kmp-code-review-platform-correctness/content.md
    ui: code-review/bill-kmp-code-review-ui/content.md
    ux-accessibility: code-review/bill-kmp-code-review-ux-accessibility/content.md

area_metadata:
  platform-correctness:
    focus: "KMP expect/actual, source-set, target-runtime, and native-boundary correctness"
  ui:
    focus: "KMP Compose UI correctness and framework usage"
  ux-accessibility:
    focus: "KMP user experience, Compose semantics, and accessibility"

code_review_composition:
  baseline_layers:
    - platform: kotlin
      skill: bill-kotlin-code-review
      scope: same-review-scope
      required: true
      mode: kmp-baseline

addon_usage:
  code-review/bill-kmp-code-review:
    - slug: android-compose
      entrypoint: android-compose-review.md
      companion_pointers:
        - android-compose-edge-to-edge.md
        - android-compose-adaptive-layouts.md
        - android-navigation-review.md
        - android-design-system-review.md
        - android-interop-review.md
    - slug: android-navigation
      entrypoint: android-navigation-review.md
    - slug: android-interop
      entrypoint: android-interop-review.md
    - slug: android-design-system
      entrypoint: android-design-system-review.md
    - slug: android-r8
      entrypoint: android-r8-review.md
  code-review/bill-kmp-code-review-ui:
    - slug: android-compose
      entrypoint: android-compose-review.md
      companion_pointers:
        - android-compose-edge-to-edge.md
        - android-compose-adaptive-layouts.md
