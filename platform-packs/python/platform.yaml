platform: python
contract_version: "1.2"
display_name: Python

routing_signals:
  strong:
    - "pyproject.toml"
    - "requirements.txt"
    - "setup.py"
    - "setup.cfg"
    - "Pipfile"
    - "poetry.lock"
    - "uv.lock"
    - "tox.ini"
    - "pytest.ini"
    - ".py"
    - "*.py"
  tie_breakers:
    - "Prefer Python when pyproject metadata, dependency lockfiles, or first-party .py source files dominate the changed product surface."
    - "Do not prefer Python for mixed repositories where Python appears only as tooling, one-off scripts, generated clients, or CI glue around another dominant stack."
    - "Exclude virtual environments, site-packages, build and dist outputs, generated protobuf or OpenAPI clients, and vendored dependency trees from dominance scoring."
  path: ["pyproject.toml", ".py", "*.py"]
  content: ["def ", "class ", "async def", "import "]

declared_code_review_areas:
  - api-contracts
  - architecture
  - performance
  - persistence
  - platform-correctness
  - reliability
  - security
  - testing
  - ui
  - ux-accessibility

declared_files:
  baseline: code-review/bill-python-code-review/content.md
  areas:
    api-contracts: code-review/bill-python-code-review-api-contracts/content.md
    architecture: code-review/bill-python-code-review-architecture/content.md
    performance: code-review/bill-python-code-review-performance/content.md
    persistence: code-review/bill-python-code-review-persistence/content.md
    platform-correctness: code-review/bill-python-code-review-platform-correctness/content.md
    reliability: code-review/bill-python-code-review-reliability/content.md
    security: code-review/bill-python-code-review-security/content.md
    testing: code-review/bill-python-code-review-testing/content.md
    ui: code-review/bill-python-code-review-ui/content.md
    ux-accessibility: code-review/bill-python-code-review-ux-accessibility/content.md
area_metadata:
  api-contracts:
    focus: "Python runtime validation, framework request/response contracts, serialization, and compatibility"
  architecture:
    focus: "Python imports, package and entry-point ownership, composition roots, and dependency lifetimes"
  performance:
    focus: "Python ORM evaluation, I/O, memory, GIL-aware executors, bounded concurrency, and async latency"
  persistence:
    focus: "Python ORM sessions, transactions, locking, migrations, tenant scope, and cross-store consistency"
  platform-correctness:
    focus: "Python mutation and model semantics, runtime typing, asyncio cancellation, resources, and time logic"
  reliability:
    focus: "Python client timeouts, retries, queues, workers, task shutdown, observability, and degradation"
  security:
    focus: "Python supply chain, authorization, unsafe parsing/rendering/uploads/paths, subprocesses, SSRF, and secrets"
  testing:
    focus: "High-value pytest, property and async evidence, fixtures, concurrency, integration boundaries, and regression proof"
  ui:
    focus: "Python-owned admin, templates, notebooks, reports, dashboards, forms, state, and desktop rendering"
  ux-accessibility:
    focus: "Python-owned semantics, forms, focus and keyboard flow, feedback, localization, notebooks, and reports"

lane_conditions:
  architecture: { required: true }
  platform-correctness: { required: true }
  performance: { content: ["asyncio", "executor", "memory", "queryset"] }
  security: { content: ["authorize", "subprocess", "yaml.load", "secret"] }
  testing: { path: ["test_", "_test.py"] }
  api-contracts: { content: ["pydantic", "request", "response", "schema"] }
  persistence: { content: ["transaction", "session", "migration", "database"] }
  reliability: { content: ["retry", "timeout", "queue", "shutdown"] }
  ui: { content: ["template", "dashboard", "widget", "form"] }
  ux-accessibility: { content: ["aria-", "focus", "keyboard", "localization"] }

declared_quality_check_file: quality-check/bill-python-code-check/content.md

