platform: python
contract_version: "1.1"
display_name: Python

routing_signals:
  strong:
    - "pyproject.toml"
    - "requirements.txt"
    - "setup.py"
    - "setup.cfg"
    - "Pipfile"
    - "poetry.lock"
    - "uv.lock"
    - "tox.ini"
    - "pytest.ini"
    - ".py"
    - "*.py"
  tie_breakers:
    - "Prefer Python when pyproject metadata, dependency lockfiles, or first-party .py source files dominate the changed product surface."
    - "Do not prefer Python for mixed repositories where Python appears only as tooling, one-off scripts, generated clients, or CI glue around another dominant stack."
    - "Exclude virtual environments, site-packages, build and dist outputs, generated protobuf or OpenAPI clients, and vendored dependency trees from dominance scoring."

declared_code_review_areas:
  - api-contracts
  - architecture
  - performance
  - persistence
  - platform-correctness
  - reliability
  - security
  - testing
  - ui
  - ux-accessibility

declared_files:
  baseline: code-review/bill-python-code-review/content.md
  areas:
    api-contracts: code-review/bill-python-code-review-api-contracts/content.md
    architecture: code-review/bill-python-code-review-architecture/content.md
    performance: code-review/bill-python-code-review-performance/content.md
    persistence: code-review/bill-python-code-review-persistence/content.md
    platform-correctness: code-review/bill-python-code-review-platform-correctness/content.md
    reliability: code-review/bill-python-code-review-reliability/content.md
    security: code-review/bill-python-code-review-security/content.md
    testing: code-review/bill-python-code-review-testing/content.md
    ui: code-review/bill-python-code-review-ui/content.md
    ux-accessibility: code-review/bill-python-code-review-ux-accessibility/content.md
area_metadata:
  api-contracts:
    focus: "Python API contracts, validation, serialization, and compatibility"
  architecture:
    focus: "Python package boundaries, import direction, and dependency ownership"
  performance:
    focus: "Python performance risks in hot paths, I/O, memory, imports, and async boundaries"
  persistence:
    focus: "ORM/raw SQL usage, migrations, transactions, sessions, and data consistency"
  platform-correctness:
    focus: "Python runtime semantics, typing edge cases, resources, concurrency, and time logic"
  reliability:
    focus: "timeouts, retries, workers, schedulers, external clients, observability, and degradation"
  security:
    focus: "dependency supply chain, trust boundaries, secrets, unsafe parsing, subprocesses, and sensitive logs"
  testing:
    focus: "pytest/unittest quality, fixtures, parametrization, integration boundaries, and regression proof"
  ui:
    focus: "Python-rendered UI, templates, admin surfaces, notebooks, and dashboards"
  ux-accessibility:
    focus: "server-rendered accessibility, forms, feedback, keyboard flow, and localization-sensitive UX"

declared_quality_check_file: quality-check/bill-python-code-check/content.md

