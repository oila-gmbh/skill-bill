    description: "Python performance specialist code reviewer. Runs against Python ORM evaluation, I/O, memory, GIL-aware executors, bounded concurrency, and async latency. Returns a Risk Register in the F-XXX bullet format."
    compose: governed-content
  - name: bill-python-code-review-persistence
    description: "Python persistence specialist code reviewer. Runs against Python ORM sessions, transactions, locking, migrations, tenant scope, and cross-store consistency. Returns a Risk Register in the F-XXX bullet format."
    compose: governed-content
  - name: bill-python-code-review-platform-correctness
    description: "Python platform correctness specialist code reviewer. Runs against Python mutation and model semantics, runtime typing, asyncio cancellation, resources, and time logic. Returns a Risk Register in the F-XXX bullet format."
