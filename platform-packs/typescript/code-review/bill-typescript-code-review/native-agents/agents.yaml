contract_version: "0.1"
agents:
  - name: bill-typescript-code-review-api-contracts
    description: "TypeScript api contracts specialist code reviewer. Runs against erased TypeScript declarations, runtime schemas, JavaScript consumers, HTTP/RPC/events, serialization, idempotency, and version skew. Returns a Risk Register in the F-XXX bullet format."
    compose: governed-content
  - name: bill-typescript-code-review-architecture
    description: "TypeScript architecture specialist code reviewer. Runs against TypeScript workspaces, project references, package exports, build graphs, dependency direction, runtime partitions, and lifecycle ownership. Returns a Risk Register in the F-XXX bullet format."
    compose: governed-content
  - name: bill-typescript-code-review-performance
    description: "TypeScript performance specialist code reviewer. Runs against Node/browser event loops, promise fan-out, streams and backpressure, allocation, bundles, rendering, hydration, and retained resources. Returns a Risk Register in the F-XXX bullet format."
    compose: governed-content
  - name: bill-typescript-code-review-persistence
    description: "TypeScript persistence specialist code reviewer. Runs against TypeScript ORM/query clients, transaction isolation and retries, migrations, mixed versions, connection lifecycles, and durable serialization. Returns a Risk Register in the F-XXX bullet format."
    compose: governed-content
  - name: bill-typescript-code-review-platform-correctness
    description: "TypeScript platform correctness specialist code reviewer. Runs against TypeScript narrowing, generics and escape hatches, declaration/emission parity, ESM/CommonJS, bundlers, targets, and runtime availability. Returns a Risk Register in the F-XXX bullet format."
    compose: governed-content
  - name: bill-typescript-code-review-reliability
    description: "TypeScript reliability specialist code reviewer. Runs against observed promises, causal errors, AbortSignal cancellation, bounded queues, retries, stream cleanup, process shutdown, and telemetry. Returns a Risk Register in the F-XXX bullet format."
    compose: governed-content
  - name: bill-typescript-code-review-security
    description: "TypeScript security specialist code reviewer. Runs against browser/server identity boundaries, runtime validation, XSS/CSRF and injection sinks, client secrets, lockfiles, build plugins, and supply chain. Returns a Risk Register in the F-XXX bullet format."
    compose: governed-content
  - name: bill-typescript-code-review-testing
    description: "TypeScript testing specialist code reviewer. Runs against TypeScript type assertions, behavioral unit/integration/contract/browser/worker tests, package entry points, module matrices, async races, and regression proof. Returns a Risk Register in the F-XXX bullet format."
    compose: governed-content
  - name: bill-typescript-code-review-ui
    description: "TypeScript ui specialist code reviewer. Runs against detected DOM/TSX frameworks, state and effects, typed events and forms, async races, rendering, routing, hydration, cleanup, and recovery. Returns a Risk Register in the F-XXX bullet format."
    compose: governed-content
  - name: bill-typescript-code-review-ux-accessibility
    description: "TypeScript ux accessibility specialist code reviewer. Runs against framework-rendered semantics, accessible names, focus and keyboard behavior, live feedback, localization, direction, zoom, motion, and assistive technology. Returns a Risk Register in the F-XXX bullet format."
    compose: governed-content
