platform: typescript
contract_version: "1.2"
display_name: TypeScript

routing_signals:
  strong:
    - "tsconfig.json"
    - "tsconfig.*.json"
    - ".ts"
    - "*.ts"
    - ".tsx"
    - "*.tsx"
    - ".mts"
    - "*.mts"
    - ".cts"
    - "*.cts"
  tie_breakers:
    - "Prefer TypeScript only when tsconfig metadata or first-party TypeScript source files dominate the changed product surface. Treat package.json, package-lock.json, yarn.lock, pnpm-lock.yaml, bun.lockb, biome.json, ESLint configuration, and Prettier configuration as contextual metadata only; individually or combined, they are not TypeScript evidence without TypeScript ownership."
    - "Do not prefer TypeScript where it appears only as generated API clients, ambient *.d.ts declarations, or build tooling around another dominant stack."
    - "Exclude node_modules/, dist/, build and coverage output, generated clients, generated declaration files, and vendored dependency trees from dominance scoring."
  path: ["tsconfig.json", "tsconfig.*.json", ".ts", "*.ts", ".tsx", "*.tsx", ".mts", "*.mts", ".cts", "*.cts"]
  content: ["typescript", "interface", "type ", "import "]

declared_code_review_areas:
  - api-contracts
  - architecture
  - performance
  - persistence
  - platform-correctness
  - reliability
  - security
  - testing
  - ui
  - ux-accessibility

declared_files:
  baseline: code-review/bill-typescript-code-review/content.md
  areas:
    api-contracts: code-review/bill-typescript-code-review-api-contracts/content.md
    architecture: code-review/bill-typescript-code-review-architecture/content.md
    performance: code-review/bill-typescript-code-review-performance/content.md
    persistence: code-review/bill-typescript-code-review-persistence/content.md
    platform-correctness: code-review/bill-typescript-code-review-platform-correctness/content.md
    reliability: code-review/bill-typescript-code-review-reliability/content.md
    security: code-review/bill-typescript-code-review-security/content.md
    testing: code-review/bill-typescript-code-review-testing/content.md
    ui: code-review/bill-typescript-code-review-ui/content.md
    ux-accessibility: code-review/bill-typescript-code-review-ux-accessibility/content.md
area_metadata:
  api-contracts:
    focus: "erased TypeScript declarations, runtime schemas, JavaScript consumers, HTTP/RPC/events, serialization, idempotency, and version skew"
  architecture:
    focus: "TypeScript workspaces, project references, package exports, build graphs, dependency direction, runtime partitions, and lifecycle ownership"
  performance:
    focus: "Node/browser event loops, promise fan-out, streams and backpressure, allocation, bundles, rendering, hydration, and retained resources"
  persistence:
    focus: "TypeScript ORM/query clients, transaction isolation and retries, migrations, mixed versions, connection lifecycles, and durable serialization"
  platform-correctness:
    focus: "TypeScript narrowing, generics and escape hatches, declaration/emission parity, ESM/CommonJS, bundlers, targets, and runtime availability"
  reliability:
    focus: "observed promises, causal errors, AbortSignal cancellation, bounded queues, retries, stream cleanup, process shutdown, and telemetry"
  security:
    focus: "browser/server identity boundaries, runtime validation, XSS/CSRF and injection sinks, client secrets, lockfiles, build plugins, and supply chain"
  testing:
    focus: "TypeScript type assertions, behavioral unit/integration/contract/browser/worker tests, package entry points, module matrices, async races, and regression proof"
  ui:
    focus: "detected DOM/TSX frameworks, state and effects, typed events and forms, async races, rendering, routing, hydration, cleanup, and recovery"
  ux-accessibility:
    focus: "framework-rendered semantics, accessible names, focus and keyboard behavior, live feedback, localization, direction, zoom, motion, and assistive technology"

lane_conditions:
  architecture: { required: true }
  platform-correctness: { required: true }
  performance: { content: ["stream", "buffer", "allocation", "hydrate"] }
  security: { content: ["authorization", "csrf", "xss", "secret"] }
  testing: { path: [".test.ts", ".spec.ts", ".test.tsx", ".spec.tsx"] }
  api-contracts: { content: ["schema", "request", "response", "serialize"] }
  persistence: { content: ["transaction", "migration", "database", "prisma"] }
  reliability: { content: ["retry", "abortsignal", "shutdown", "queue"] }
  ui: { path: [".tsx", "*.tsx"] }
  ux-accessibility: { content: ["aria-", "focus", "keyboard", "localization"] }

declared_quality_check_file: quality-check/bill-typescript-code-check/content.md

