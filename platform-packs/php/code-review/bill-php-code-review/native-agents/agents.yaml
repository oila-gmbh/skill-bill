contract_version: "0.1"
agents:
  - name: bill-php-code-review-api-contracts
    description: "PHP api contracts specialist code reviewer. Runs against PHP Symfony, Laravel, and PSR request validation, serialization, errors, webhooks, idempotency, and client compatibility. Returns a Risk Register in the F-XXX bullet format."
    compose: governed-content
  - name: bill-php-code-review-architecture
    description: "PHP architecture specialist code reviewer. Runs against PHP Composer and PSR-4 boundaries, composition roots, container and worker lifetimes, transactions, generators, and fibers. Returns a Risk Register in the F-XXX bullet format."
    compose: governed-content
  - name: bill-php-code-review-performance
    description: "PHP performance specialist code reviewer. Runs against PHP PDO and ORM query cost, serializers and templates, streaming, OPcache, autoload state, worker memory, and fiber blocking. Returns a Risk Register in the F-XXX bullet format."
    compose: governed-content
  - name: bill-php-code-review-persistence
    description: "PHP persistence specialist code reviewer. Runs against PHP PDO, Doctrine, and Eloquent transactions, locking, unit-of-work lifetime, tenant scope, migrations, and streaming. Returns a Risk Register in the F-XXX bullet format."
    compose: governed-content
  - name: bill-php-code-review-platform-correctness
    description: "PHP platform correctness specialist code reviewer. Runs against PHP coercion, truthiness, errors, references, generators, request-versus-worker lifetime, autoloading, and fiber correctness. Returns a Risk Register in the F-XXX bullet format."
    compose: governed-content
  - name: bill-php-code-review-reliability
    description: "PHP reliability specialist code reviewer. Runs against PHP Laravel and Messenger queues, acknowledgement, retry, worker reset, signals, timeouts, caches, locks, and fatal telemetry. Returns a Risk Register in the F-XXX bullet format."
    compose: governed-content
  - name: bill-php-code-review-security
    description: "PHP security specialist code reviewer. Runs against PHP authorization, CSRF, deserialization, Blade and Twig escaping, uploads, paths, processes, SSRF, proxies, and secrets. Returns a Risk Register in the F-XXX bullet format."
    compose: governed-content
  - name: bill-php-code-review-testing
    description: "PHP testing specialist code reviewer. Runs against PHPUnit and Pest isolation, framework kernels, database and worker regressions, PHPStan and Psalm, and runtime matrices. Returns a Risk Register in the F-XXX bullet format."
    compose: governed-content
  - name: bill-php-code-review-ui
    description: "PHP ui specialist code reviewer. Runs against PHP Blade, Twig, Livewire, Inertia, Filament, and Symfony Form state, escaping, identity, and hydration correctness. Returns a Risk Register in the F-XXX bullet format."
    compose: governed-content
  - name: bill-php-code-review-ux-accessibility
    description: "PHP ux accessibility specialist code reviewer. Runs against PHP-rendered labels, errors, keyboard and focus behavior, landmarks, live updates, localization, and progressive enhancement. Returns a Risk Register in the F-XXX bullet format."
    compose: governed-content
