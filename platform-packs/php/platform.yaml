platform: php
contract_version: "1.2"
display_name: PHP

routing_signals:
  strong:
    - "composer.json"
    - "composer.lock"
    - ".php"
    - "*.php"
    - "phpunit.xml"
    - "phpunit.xml.dist"
    - "pest.php"
    - "phpstan.neon"
    - "psalm.xml"
  tie_breakers:
    - "Prefer PHP when Composer metadata, PHP source files, or PHP tests dominate the changed product surface."
    - "Do not prefer PHP in adjacent mixed-stack repositories when PHP appears only as tooling or CI glue around another dominant stack."
    - "Exclude vendor/ dependencies, generated clients, and other generated artifacts from dominance scoring."

declared_code_review_areas:
  - api-contracts
  - architecture
  - performance
  - persistence
  - platform-correctness
  - reliability
  - security
  - testing
  - ui
  - ux-accessibility

declared_files:
  baseline: code-review/bill-php-code-review/content.md
  areas:
    api-contracts: code-review/bill-php-code-review-api-contracts/content.md
    architecture: code-review/bill-php-code-review-architecture/content.md
    performance: code-review/bill-php-code-review-performance/content.md
    persistence: code-review/bill-php-code-review-persistence/content.md
    platform-correctness: code-review/bill-php-code-review-platform-correctness/content.md
    reliability: code-review/bill-php-code-review-reliability/content.md
    security: code-review/bill-php-code-review-security/content.md
    testing: code-review/bill-php-code-review-testing/content.md
    ui: code-review/bill-php-code-review-ui/content.md
    ux-accessibility: code-review/bill-php-code-review-ux-accessibility/content.md
area_metadata:
  api-contracts:
    focus: "PHP API contracts, request validation, resources and serializers, error payloads, and client compatibility"
  architecture:
    focus: "PHP module and layer boundaries, dependency direction, framework coupling, and cross-boundary composition"
  performance:
    focus: "PHP hot paths, N+1 queries, serialization and rendering waste, worker memory, and bounded batch work"
  persistence:
    focus: "PHP ORM and SQL boundaries, transactions, locking, migrations, tenant scoping, and data consistency"
  platform-correctness:
    focus: "PHP coercion and null semantics, business invariants, state transitions, retries, worker lifecycle, and runtime correctness"
  reliability:
    focus: "PHP queues, jobs, schedulers, caches, timeouts, retries, downstream failures, and observability"
  security:
    focus: "PHP authentication and authorization, uploads, signed URLs, templates, deserialization, secrets, and sensitive logs"
  testing:
    focus: "PHPUnit and Pest regression proof, contract and persistence tests, deterministic retries, and assertion quality"
  ui:
    focus: "PHP Blade, Twig, Livewire, Inertia, and Filament rendering, forms, state ownership, and interactive admin correctness"
  ux-accessibility:
    focus: "PHP server-rendered semantics, labels, keyboard and focus behavior, validation feedback, localization, and accessible task completion"

declared_quality_check_file: quality-check/bill-php-code-check/content.md

