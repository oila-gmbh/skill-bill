platform: php
contract_version: "1.2"
display_name: PHP

routing_signals:
  strong:
    - "composer.json"
    - "composer.lock"
    - ".php"
    - "*.php"
    - "phpunit.xml"
    - "phpunit.xml.dist"
    - "pest.php"
    - "phpstan.neon"
    - "psalm.xml"
  tie_breakers:
    - "Prefer PHP when Composer metadata or .php source files dominate mixed backend signals."

declared_code_review_areas:
  - api-contracts
  - architecture
  - performance
  - persistence
  - platform-correctness
  - reliability
  - security
  - testing
  - ui
  - ux-accessibility

declared_files:
  baseline: code-review/bill-php-code-review/content.md
  areas:
    api-contracts: code-review/bill-php-code-review-api-contracts/content.md
    architecture: code-review/bill-php-code-review-architecture/content.md
    performance: code-review/bill-php-code-review-performance/content.md
    persistence: code-review/bill-php-code-review-persistence/content.md
    platform-correctness: code-review/bill-php-code-review-platform-correctness/content.md
    reliability: code-review/bill-php-code-review-reliability/content.md
    security: code-review/bill-php-code-review-security/content.md
    testing: code-review/bill-php-code-review-testing/content.md
    ui: code-review/bill-php-code-review-ui/content.md
    ux-accessibility: code-review/bill-php-code-review-ux-accessibility/content.md
area_metadata:
  api-contracts:
    focus: "API contracts, request validation, and serialization"
  architecture:
    focus: "architecture, boundaries, and dependency direction"
  performance:
    focus: "performance risks on hot paths, blocking I/O, and resource usage"
  persistence:
    focus: "persistence, transactions, migrations, and data consistency"
  platform-correctness:
    focus: "lifecycle, concurrency, threading, and logic correctness"
  reliability:
    focus: "timeouts, retries, background work, and observability"
  security:
    focus: "secrets handling, auth, and sensitive-data exposure"
  testing:
    focus: "test coverage quality and regression protection"
  ui:
    focus: "UI correctness and framework usage"
  ux-accessibility:
    focus: "UX correctness and accessibility"

declared_quality_check_file: quality-check/bill-php-code-check/content.md

