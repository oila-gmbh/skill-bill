platform: php
contract_version: "1.2"
display_name: PHP

routing_signals:
  strong:
    - "composer.json"
    - "composer.lock"
    - ".php"
    - "*.php"
    - "phpunit.xml"
    - "phpunit.xml.dist"
    - "pest.php"
    - "phpstan.neon"
    - "psalm.xml"
  tie_breakers:
    - "Prefer PHP when Composer metadata, PHP source files, or PHP tests dominate the changed product surface."
    - "Do not prefer PHP in adjacent mixed-stack repositories when PHP appears only as tooling or CI glue around another dominant stack."
    - "Exclude vendor/ dependencies, generated clients, and other generated artifacts from dominance scoring."

declared_code_review_areas:
  - api-contracts
  - architecture
  - performance
  - persistence
  - platform-correctness
  - reliability
  - security
  - testing
  - ui
  - ux-accessibility

declared_files:
  baseline: code-review/bill-php-code-review/content.md
  areas:
    api-contracts: code-review/bill-php-code-review-api-contracts/content.md
    architecture: code-review/bill-php-code-review-architecture/content.md
    performance: code-review/bill-php-code-review-performance/content.md
    persistence: code-review/bill-php-code-review-persistence/content.md
    platform-correctness: code-review/bill-php-code-review-platform-correctness/content.md
    reliability: code-review/bill-php-code-review-reliability/content.md
    security: code-review/bill-php-code-review-security/content.md
    testing: code-review/bill-php-code-review-testing/content.md
    ui: code-review/bill-php-code-review-ui/content.md
    ux-accessibility: code-review/bill-php-code-review-ux-accessibility/content.md
area_metadata:
  api-contracts:
    focus: "PHP Symfony, Laravel, and PSR request validation, serialization, errors, webhooks, idempotency, and client compatibility"
  architecture:
    focus: "PHP Composer and PSR-4 boundaries, composition roots, container and worker lifetimes, transactions, generators, and fibers"
  performance:
    focus: "PHP PDO and ORM query cost, serializers and templates, streaming, OPcache, autoload state, worker memory, and fiber blocking"
  persistence:
    focus: "PHP PDO, Doctrine, and Eloquent transactions, locking, unit-of-work lifetime, tenant scope, migrations, and streaming"
  platform-correctness:
    focus: "PHP coercion, truthiness, errors, references, generators, request-versus-worker lifetime, autoloading, and fiber correctness"
  reliability:
    focus: "PHP Laravel and Messenger queues, acknowledgement, retry, worker reset, signals, timeouts, caches, locks, and fatal telemetry"
  security:
    focus: "PHP authorization, CSRF, deserialization, Blade and Twig escaping, uploads, paths, processes, SSRF, proxies, and secrets"
  testing:
    focus: "PHPUnit and Pest isolation, framework kernels, database and worker regressions, PHPStan and Psalm, and runtime matrices"
  ui:
    focus: "PHP Blade, Twig, Livewire, Inertia, Filament, and Symfony Form state, escaping, identity, and hydration correctness"
  ux-accessibility:
    focus: "PHP-rendered labels, errors, keyboard and focus behavior, landmarks, live updates, localization, and progressive enhancement"

declared_quality_check_file: quality-check/bill-php-code-check/content.md

