name: Validate agent configs

on:
  pull_request:
  push:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install skill-bill package
        run: pip install -e .

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run validator e2e tests
        run: python3 -m unittest discover -s tests

      - name: Run agnix
        run: |
          set +e
          output_file="$(mktemp)"
          npx --yes agnix --strict . >"$output_file" 2>&1
          status=$?
          cat "$output_file"
          if grep -q "Found 0 errors" "$output_file"; then
            exit 0
          fi
          exit "$status"

      - name: Run repo-native validation
        run: python3 scripts/validate_agent_configs.py
