name: Validate agent configs

on:
  pull_request:
  push:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Kotlin runtime checks
        run: (cd runtime-kotlin && ./gradlew check)

      - name: Run agnix
        run: |
          set +e
          output_file="$(mktemp)"
          npx --yes agnix --strict . >"$output_file" 2>&1
          status=$?
          cat "$output_file"
          if grep -q "Found 0 errors" "$output_file"; then
            exit 0
          fi
          exit "$status"

      - name: Run repo-native validation
        run: scripts/validate_agent_configs
