name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Kotlin runtime checks
        run: (cd runtime-kotlin && ./gradlew check)

      - name: Run agnix
        run: |
          set +e
          output_file="$(mktemp)"
          npx --yes agnix --strict . >"$output_file" 2>&1
          status=$?
          cat "$output_file"
          if grep -q "Found 0 errors" "$output_file"; then
            exit 0
          fi
          exit "$status"

      - name: Run repo-native validation
        run: scripts/validate_agent_configs

      - name: Validate release tag
        id: release_meta
        run: scripts/validate_release_ref "$GITHUB_REF_NAME" --github-output "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.release_meta.outputs.tag }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release ${{ steps.release_meta.outputs.tag }} already exists; skipping publish."
            exit 0
          fi

          args=(
            "${{ steps.release_meta.outputs.tag }}"
            --repo "${{ github.repository }}"
            --title "${{ steps.release_meta.outputs.tag }}"
            --generate-notes
            --verify-tag
          )

          if [[ "${{ steps.release_meta.outputs.prerelease }}" == "true" ]]; then
            args+=(--prerelease)
          fi

          gh release create "${args[@]}"
