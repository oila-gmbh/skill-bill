name: Install smoke test

on:
  pull_request:
  push:
    branches: [main]

# Collapse a burst of pushes/PR updates on the same ref to a single run: a newer
# commit cancels the superseded one instead of queueing behind it on the single
# self-hosted runner.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-test:
    # Self-hosted Mac mini for trusted runs (push, same-repo PRs); fork PRs fall
    # back to a GitHub-hosted runner so untrusted code never executes on the
    # self-hosted host (this is a public repo). Running under macOS bash 3.2 also
    # makes this the ideal regression environment for the curl-piped installer.
    runs-on: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork) && fromJSON('["ubuntu-latest"]') || fromJSON('["self-hosted","macmini"]') }}
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Build runtime CLI
        run: (cd runtime-kotlin && ./gradlew -q :runtime-cli:installDist :runtime-mcp:installDist)

      - name: Run install smoke test
        run: bash scripts/install_smoke_test.sh
