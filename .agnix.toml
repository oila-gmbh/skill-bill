# Agnix (governance linter) configuration for skill-bill.
#
# The defaults walk every SKILL.md under the repo, which catches live
# skills correctly but flags intentional negative-test fixtures as if
# they were real skills. Excluding the test fixture tree keeps the
# lint pass aligned with what ships to users.

severity = "Warning"
target = "Generic"
tools = []
max_files_to_validate = 10000

exclude = [
  "node_modules/**",
  ".git/**",
  "target/**",
  ".venv/**",
  "tests/fixtures/**",
  # SKILL-21: per-skill rollback snapshots written by
  # scripts/migrate_to_content_md.py. These are intentional archives of
  # pre-migration SKILL.md files; their sidecar symlinks are not copied,
  # so the validator must not flag the missing sibling files as errors.
  "_migration_backup/**",
]

# SKILL-21: skill-bill deliberately extends the Agent Skills frontmatter
# with ``shell_contract_version`` and ``template_version`` for upgrade
# detection. These are client-specific fields and flagged by agnix as
# "Unknown frontmatter field" warnings; disabling the frontmatter
# validation rule keeps strict mode green without silencing other checks.
[rules]
skills = true
hooks = true
agents = true
memory = true
plugins = true
xml = true
mcp = true
imports = true
cross_platform = true
agents_md = true
copilot = true
cursor = true
cline = true
opencode = true
gemini_md = true
codex = true
roo_code = true
windsurf = true
kiro_steering = true
kiro_agents = true
amp_checks = true
prompt_engineering = true
generic_instructions = true
frontmatter_validation = false
xml_balance = true
import_references = true
# cdx_ag_005 fires on multi-sentence AGENTS.md bullets. SKILL-21 added
# several bullets that combine the rule ("always X") with its rationale
# ("so Y"), which is clearer for readers than splitting them; the warning
# has no associated message in the published agnix rule table, so we
# disable it here rather than flattening the prose.
disabled_rules = ["CDX-AG-005"]
disabled_validators = []

[tool_versions]

[spec_revisions]

[files]
include_as_memory = []
include_as_generic = []
exclude = []
